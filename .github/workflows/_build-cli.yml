name: Build CLI

on:
  workflow_call:
    inputs:
      version_tag:
        description: "Explicit version tag (e.g. v1.2.3-rc.1). Passed to the version action."
        required: false
        type: string
        default: ""
      build_installer:
        description: "Also build the platform installer (windows-arm64 only)"
        required: false
        type: boolean
        default: false
      upload_artifact:
        description: "Upload the built artifact(s)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-arm64
            runner: windows-arm64
          - platform: linux-arm64
            runner: linux-arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    steps:
      - name: Configure Windows Git
        if: matrix.platform == 'windows-arm64'
        shell: cmd
        run: |
          echo C:\Program Files\Git\bin>>%GITHUB_PATH%
          git config --global core.longpaths true

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false
          token: ${{ secrets.GH_PAT }}

      - name: Detect build version
        id: version
        uses: ./.github/actions/version
        with:
          version_tag: ${{ inputs.version_tag }}

      - name: Download SDK artifact
        uses: actions/download-artifact@v8
        with:
          name: sdk-${{ matrix.platform }}
          path: sdk/pkg-geniex/

      # Skip on Windows: action-cache keys hit but Bazel's internal action
      # hash doesn't, so we pay ~80s of cache I/O for <2% reuse. Linux sees
      # ~99% hit, so the cache is worth keeping there.
      - name: Restore Bazel disk cache
        if: runner.os == 'Linux'
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel-disk
          key: bazel-cli-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', 'cli/**/BUILD.bazel', 'cli/**/*.bzl') }}
          restore-keys: |
            bazel-cli-${{ runner.os }}-

      # Windows: installer target pulls cli/cmd/geniex transitively, so
      # skip this step when build_installer is set.
      - name: Build CLI (Windows)
        if: matrix.platform == 'windows-arm64' && !inputs.build_installer
        shell: cmd
        run: bazelisk build //cli:artifact --//sdk:sdk_type=local

      - name: Build CLI (Linux)
        if: matrix.platform == 'linux-arm64'
        shell: bash
        run: |
          set -euo pipefail
          bazelisk build //cli:artifact --//sdk:sdk_type=local

      - name: Build Windows installer
        if: inputs.build_installer && matrix.platform == 'windows-arm64'
        shell: bash
        env:
          RAW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          bare="${RAW_VERSION#v}"
          bazelisk build //cli/release/windows --//sdk:sdk_type=local "--define=VERSION=${bare}"

      - name: Upload Windows installer artifact
        if: inputs.upload_artifact && inputs.build_installer && matrix.platform == 'windows-arm64'
        uses: actions/upload-artifact@v7
        with:
          name: cli-installer-windows-arm64
          path: bazel-bin/cli/release/windows/geniex-cli-setup.exe
          retention-days: 1

      - name: Upload Linux CLI artifact
        if: inputs.upload_artifact && matrix.platform == 'linux-arm64'
        uses: actions/upload-artifact@v7
        with:
          name: cli-linux-arm64
          path: bazel-bin/cli/artifact.zip
          retention-days: 1
