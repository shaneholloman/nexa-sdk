name: Build CLI

on:
  workflow_call:
    inputs:
      platform:
        description: "Target platform: linux-arm64 or windows-arm64"
        required: true
        type: string
      runner:
        description: "Runner label"
        required: true
        type: string
      build_installer:
        description: "Also build the platform installer (//cli/release/<platform>)"
        required: false
        type: boolean
        default: false
      upload_artifact:
        description: "Upload the built installer as a workflow artifact"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60

    steps:
      - name: Configure Windows Git
        if: inputs.platform == 'windows-arm64'
        shell: cmd
        run: |
          echo C:\Program Files\Git\bin>>%GITHUB_PATH%
          git config --global core.longpaths true

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false
          token: ${{ secrets.GH_PAT }}

      - name: Detect build version
        id: version
        uses: ./.github/actions/version

      - name: Download SDK artifact
        uses: actions/download-artifact@v5
        with:
          name: sdk-${{ inputs.platform }}
          path: sdk/pkg-geniex/

      # Bazel disk cache (hot path for //cli builds). Key narrows to the
      # per-runner-OS CLI build inputs — changes to MODULE.bazel.lock or any
      # cli BUILD file bust the primary key; the restore-keys prefix still
      # covers warm-start rehydration.
      - name: Restore Bazel disk cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-cli-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', 'cli/**/BUILD.bazel', 'cli/**/*.bzl') }}
          restore-keys: |
            bazel-cli-${{ runner.os }}-

      # Build just the CLI binary on Windows. Skipped when build_installer is
      # set because the installer target (//cli/release/windows) pulls in
      # //cli/cmd/geniex as a src and Bazel will build it transitively.
      - name: Build CLI (Windows)
        if: inputs.platform == 'windows-arm64' && !inputs.build_installer
        shell: cmd
        run: bazelisk build //cli:artifact --//sdk:sdk_type=local

      - name: Build CLI (Linux)
        if: inputs.platform == 'linux-arm64'
        shell: bash
        run: |
          set -euo pipefail
          bazelisk build //cli:artifact --//sdk:sdk_type=local

      - name: Build Windows installer
        if: inputs.build_installer && inputs.platform == 'windows-arm64'
        shell: bash
        env:
          RAW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          bare="${RAW_VERSION#v}"
          bazelisk build //cli/release/windows --//sdk:sdk_type=local "--define=VERSION=${bare}"

      - name: Upload Windows installer artifact
        if: inputs.upload_artifact && inputs.build_installer && inputs.platform == 'windows-arm64'
        uses: actions/upload-artifact@v5
        with:
          name: cli-installer-windows-arm64
          path: bazel-bin/cli/release/windows/geniex-cli-setup.exe
          retention-days: 1

      - name: Upload Linux CLI artifact
        if: inputs.upload_artifact && inputs.platform == 'linux-arm64'
        uses: actions/upload-artifact@v5
        with:
          name: cli-linux-arm64
          path: bazel-bin/cli/artifact.zip
          retention-days: 1
