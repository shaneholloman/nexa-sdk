name: Build Docker

# We push the Bazel OCI tarball with crane rather than `docker load`
# because the runner's docker daemon rejects rules_oci image-layout
# tarballs with "unexpected EOF".

on:
  workflow_call:
    inputs:
      version_tag:
        description: "Explicit version tag (e.g. v1.2.3-rc.1). Passed to the version action."
        required: false
        type: string
        default: ""
      push:
        description: "Push the image to the registries (release-time only)"
        required: false
        type: boolean
        default: false
      tag:
        description: "Image tag to publish, e.g. v1.2.3 (required when push=true)."
        required: false
        type: string
        default: ""
      is_prerelease:
        description: "When true, skip moving the :latest tag."
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false
          token: ${{ secrets.GH_PAT }}

      - name: Detect build version
        id: version
        uses: ./.github/actions/version
        with:
          version_tag: ${{ inputs.version_tag }}

      - name: Download linux-arm64 SDK artifact
        uses: actions/download-artifact@v8
        with:
          name: sdk-linux-arm64
          path: sdk/pkg-geniex/

      - name: Restore Bazel disk cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel-disk
          key: bazel-cli-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', 'cli/**/BUILD.bazel', 'cli/**/*.bzl') }}
          restore-keys: |
            bazel-cli-${{ runner.os }}-

      - name: Build docker tarball (//cli/release/linux)
        shell: bash
        env:
          RAW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          bazelisk build //cli/release/linux --//sdk:sdk_type=local "--define=VERSION=${RAW_VERSION}"

      - name: Install crane (for OCI tarball → registry push)
        shell: bash
        run: |
          set -euo pipefail
          if command -v crane >/dev/null 2>&1; then
            crane version
            exit 0
          fi
          version="v0.20.3"
          arch="arm64"
          tmp="$(mktemp -d)"
          curl -fsSL -o "${tmp}/crane.tgz" \
            "https://github.com/google/go-containerregistry/releases/download/${version}/go-containerregistry_Linux_${arch}.tar.gz"
          mkdir -p "${HOME}/.local/bin"
          tar -xzf "${tmp}/crane.tgz" -C "${HOME}/.local/bin" crane
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          "${HOME}/.local/bin/crane" version

      - name: Determine image refs
        shell: bash
        env:
          RAW_VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          bare="${RAW_VERSION#v}"
          dest_tag="${TAG:-$bare}"
          echo "DOCKERHUB_REF=docker.io/qualcomm/geniex:${dest_tag}" >> "$GITHUB_ENV"

      - name: Validate tarball (PR path)
        if: ${{ !inputs.push }}
        shell: bash
        run: |
          set -euo pipefail
          tarball=bazel-bin/cli/release/linux/geniex-cli-docker.tar
          ls -la "${tarball}"
          file "${tarball}"
          tar -tf "${tarball}" | head -10

      - name: Log in to DockerHub (crane)
        if: inputs.push
        shell: bash
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "${DOCKERHUB_TOKEN}" | crane auth login docker.io -u "${DOCKERHUB_USER}" --password-stdin

      - name: Push image to DockerHub
        if: inputs.push
        shell: bash
        env:
          IMAGE_REF: ${{ env.DOCKERHUB_REF }}
          IS_PRERELEASE: ${{ inputs.is_prerelease }}
        run: |
          set -euo pipefail
          crane push bazel-bin/cli/release/linux/geniex-cli-docker.tar "${IMAGE_REF}"
          # Prereleases must not clobber the floating :latest tag.
          if [[ "${IS_PRERELEASE}" != "true" ]]; then
            crane tag "${IMAGE_REF}" latest
          fi
