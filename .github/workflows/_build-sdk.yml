name: Build SDK

on:
  workflow_call:
    inputs:
      version_tag:
        description: "Explicit version tag (e.g. v1.2.3-rc.1). Passed to the version action."
        required: false
        type: string
        default: ""
      upload_artifact:
        description: "Whether to upload SDK artifact"
        required: false
        type: boolean
        default: false
      extra_cmake_flags:
        description: "Additional CMake flags"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-arm64
            runner: windows-arm64
          - platform: linux-arm64
            runner: ubuntu-latest
          - platform: android-arm64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120

    steps:
      - name: Configure Windows Git
        if: matrix.platform == 'windows-arm64'
        shell: cmd
        run: |
          echo C:\Program Files\Git\bin>>%GITHUB_PATH%
          git config --global core.longpaths true
          git config --global core.protectNTFS false
          git config --global core.fscache true
          git config --global core.preloadindex true

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Detect build version
        id: version
        uses: ./.github/actions/version
        with:
          version_tag: ${{ inputs.version_tag }}

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-sdk-${{ matrix.platform }}-${{ github.sha }}
          restore-keys: ccache-sdk-${{ matrix.platform }}-

      # Linux/Android ccache lives in the toolchain container; host just
      # owns the dir so actions/cache can persist it.
      - name: Prepare ccache dir (Linux/Android)
        if: matrix.platform == 'linux-arm64' || matrix.platform == 'android-arm64'
        shell: bash
        run: mkdir -p "${{ github.workspace }}/.ccache"

      - name: Install and configure ccache (Windows)
        if: matrix.platform == 'windows-arm64'
        shell: powershell
        run: |
          if (-not (Get-Command ccache -ErrorAction SilentlyContinue)) {
            choco install ccache --no-progress -y
          }
          # $GITHUB_ENV only applies to later steps — set in-process too
          # so `ccache --max-size` below edits the workspace config.
          $env:CCACHE_DIR = "${{ github.workspace }}/.ccache"
          Add-Content $env:GITHUB_ENV "CCACHE_DIR=$env:CCACHE_DIR"
          ccache --max-size=1G

      - name: Setup Snapdragon SDKs
        if: matrix.platform == 'windows-arm64'
        uses: ./.github/actions/setup-snapdragon-sdks

      - name: Configure HTP signing cert
        if: matrix.platform == 'windows-arm64'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $src = "$env:GITHUB_WORKSPACE\.github\certs\hexagon\ggml-htp-v1.pfx"
          $dst = "$env:RUNNER_TEMP\ggml-htp-v1.pfx"
          Copy-Item $src $dst -Force
          Add-Content -Path $env:GITHUB_ENV -Value "HEXAGON_HTP_CERT=$dst"
          Write-Host "HEXAGON_HTP_CERT=$dst"

      - name: Build SDK (Linux, Snapdragon toolchain container)
        if: matrix.platform == 'linux-arm64'
        shell: bash
        env:
          GENIEX_VERSION: ${{ steps.version.outputs.version }}
          EXTRA_CMAKE_FLAGS: ${{ inputs.extra_cmake_flags }}
        run: |
          set -euo pipefail
          # Runs as root to apt-install toolchain bits; chown back to
          # the runner UID so upload-artifact / cache can read the tree.
          uid="$(id -u)"
          gid="$(id -g)"
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e GENIEX_VERSION \
            -e EXTRA_CMAKE_FLAGS \
            -e PLATFORM=linux-arm64 \
            -e CCACHE_DIR=/workspace/.ccache \
            -e HOST_UID="$uid" \
            -e HOST_GID="$gid" \
            --platform linux/amd64 \
            ghcr.io/snapdragon-toolchain/arm64-linux:v0.1 \
            bash -eux -c '
              git config --global --add safe.directory "*"
              apt-get update -y
              # build-essential needed for Rust proc-macro host linking.
              apt-get install -y --no-install-recommends build-essential ccache make curl ca-certificates
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
              export PATH="$HOME/.cargo/bin:$PATH"
              rustup target add aarch64-unknown-linux-gnu
              # Rust target triple is aarch64-unknown-linux-gnu, but Debian
              # names its cross compiler aarch64-linux-gnu-* (no "unknown").
              # Recent cc-rs versions stopped stripping "unknown" when deriving
              # the tool name, so onig_sys (pulled in via tokenizers-cpp) fails
              # with ToolNotFound. Underscore env-var overrides (CC_aarch64_..
              # unknown_linux_gnu) are ignored by cc-rs when it has already
              # synthesized the hyphenated default, so symlink the expected
              # names onto the real Debian binaries.
              for tool in gcc g++ ar; do
                ln -sf "/usr/bin/aarch64-linux-gnu-${tool}" \
                       "/usr/local/bin/aarch64-unknown-linux-gnu-${tool}"
              done
              bash .github/scripts/sdk-linux-android.sh
              chown -R "$HOST_UID:$HOST_GID" sdk .ccache || true
            '

      - name: Build SDK (Android, Snapdragon toolchain container)
        if: matrix.platform == 'android-arm64'
        shell: bash
        env:
          GENIEX_VERSION: ${{ steps.version.outputs.version }}
          EXTRA_CMAKE_FLAGS: ${{ inputs.extra_cmake_flags }}
        run: |
          set -euo pipefail
          # See Linux job above for the root + chown rationale.
          uid="$(id -u)"
          gid="$(id -g)"
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e GENIEX_VERSION \
            -e EXTRA_CMAKE_FLAGS \
            -e PLATFORM=android-arm64 \
            -e CCACHE_DIR=/workspace/.ccache \
            -e HOST_UID="$uid" \
            -e HOST_GID="$gid" \
            --platform linux/amd64 \
            ghcr.io/snapdragon-toolchain/arm64-android:v0.3 \
            bash -eux -c '
              git config --global --add safe.directory "*"
              apt-get update -y
              # build-essential needed for Rust proc-macro host linking.
              apt-get install -y --no-install-recommends build-essential ccache curl ca-certificates
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
              export PATH="$HOME/.cargo/bin:$PATH"
              rustup target add aarch64-linux-android
              bash .github/scripts/sdk-linux-android.sh
              chown -R "$HOST_UID:$HOST_GID" sdk .ccache || true
            '

      - name: Setup VS toolchain (Windows)
        if: matrix.platform == 'windows-arm64'
        uses: ./.github/actions/setup-vcvars

      - name: Build SDK (Windows)
        if: matrix.platform == 'windows-arm64'
        shell: powershell
        env:
          GENIEX_VERSION: ${{ steps.version.outputs.version }}
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .github/scripts/sdk-windows.ps1

      # On Linux/Android ccache runs inside the container; only the on-disk
      # size is visible from the host. Never fail the job on a stats read.
      - name: ccache stats (Linux/Android)
        if: matrix.platform == 'linux-arm64' || matrix.platform == 'android-arm64'
        shell: bash
        run: du -sh "${{ github.workspace }}/.ccache" 2>/dev/null || true

      - name: ccache stats (Windows)
        if: matrix.platform == 'windows-arm64'
        shell: powershell
        run: ccache --show-stats --verbose; $true

      - name: Upload SDK artifact
        if: inputs.upload_artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdk-${{ matrix.platform }}
          path: sdk/pkg-geniex/
          retention-days: 1
