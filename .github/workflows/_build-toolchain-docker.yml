name: Build Toolchain Docker

# Publishes the derived Snapdragon toolchain images consumed by
# _build-sdk.yml for Linux/Android SDK builds. The upstream
# ghcr.io/snapdragon-toolchain/* images lack build-essential, ccache,
# rustup, and the aarch64 Rust targets; this workflow bakes those in so
# each SDK build can skip the per-run apt-get / rustup installation.
#
# Triggers:
#   * workflow_dispatch - manual release with an explicit version input.
#   * push of a `toolchain-v*` git tag - CI-driven release; the image
#     tag equals the git tag minus the `toolchain-` prefix.
#
# Image names:
#   docker.io/qualcomm/geniex-toolchain-linux:<version>
#   docker.io/qualcomm/geniex-toolchain-android:<version>
#
# We intentionally do NOT publish a :latest tag - _build-sdk.yml pins an
# exact semantic version so upstream changes cannot silently affect SDK
# builds.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to publish, e.g. v0.1.0. Must start with v."
        required: true
        type: string
      platforms:
        description: "Which platforms to publish."
        required: false
        type: choice
        default: both
        options:
          - both
          - linux
          - android
  push:
    tags:
      - "toolchain-v*"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            dockerfile: .github/docker/toolchain-linux.Dockerfile
            image: docker.io/qualcomm/geniex-toolchain-linux
          - platform: android
            dockerfile: .github/docker/toolchain-android.Dockerfile
            image: docker.io/qualcomm/geniex-toolchain-android

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Resolve version and platform filter
        id: meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PLATFORMS: ${{ inputs.platforms }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_VERSION}" ]]; then
            version="${INPUT_VERSION}"
            platforms="${INPUT_PLATFORMS:-both}"
          else
            # Tag push: strip the toolchain- prefix.
            tag="${GITHUB_REF#refs/tags/}"
            version="${tag#toolchain-}"
            platforms="both"
          fi
          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.+-]+)?$ ]]; then
            echo "Version '${version}' is not a SemVer 'vX.Y.Z' or prerelease tag" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "platforms=${platforms}" >> "$GITHUB_OUTPUT"

      - name: Skip platform
        if: >-
          steps.meta.outputs.platforms != 'both' &&
          steps.meta.outputs.platforms != matrix.platform
        shell: bash
        run: |
          echo "Skipping ${{ matrix.platform }}; platforms filter is ${{ steps.meta.outputs.platforms }}"
          exit 0

      - name: Set up Docker Buildx
        if: >-
          steps.meta.outputs.platforms == 'both' ||
          steps.meta.outputs.platforms == matrix.platform
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        if: >-
          steps.meta.outputs.platforms == 'both' ||
          steps.meta.outputs.platforms == matrix.platform
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # buildx pushing straight to Docker Hub fails the final blob PUT with
      # an HTML "400 Bad request"; build to a tarball and push it with crane
      # instead (same pattern as _build-docker.yml). Use type=docker, not
      # type=oci: crane's tarball loader needs the manifest.json that only
      # the docker-archive layout carries.
      - name: Build image tarball
        if: >-
          steps.meta.outputs.platforms == 'both' ||
          steps.meta.outputs.platforms == matrix.platform
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          provenance: false
          outputs: type=docker,dest=${{ runner.temp }}/toolchain-${{ matrix.platform }}.tar
          cache-from: type=gha,scope=toolchain-${{ matrix.platform }}
          cache-to: type=gha,scope=toolchain-${{ matrix.platform }},mode=max

      - name: Install crane (for tarball → registry push)
        if: >-
          steps.meta.outputs.platforms == 'both' ||
          steps.meta.outputs.platforms == matrix.platform
        shell: bash
        run: |
          set -euo pipefail
          if command -v crane >/dev/null 2>&1; then
            crane version
            exit 0
          fi
          version="v0.20.3"
          tmp="$(mktemp -d)"
          curl -fsSL -o "${tmp}/crane.tgz" \
            "https://github.com/google/go-containerregistry/releases/download/${version}/go-containerregistry_Linux_x86_64.tar.gz"
          mkdir -p "${HOME}/.local/bin"
          tar -xzf "${tmp}/crane.tgz" -C "${HOME}/.local/bin" crane
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          "${HOME}/.local/bin/crane" version

      - name: Push image with crane
        if: >-
          steps.meta.outputs.platforms == 'both' ||
          steps.meta.outputs.platforms == matrix.platform
        shell: bash
        env:
          TARBALL: ${{ runner.temp }}/toolchain-${{ matrix.platform }}.tar
          IMAGE: ${{ matrix.image }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          crane push "${TARBALL}" "${IMAGE}:${VERSION}"
