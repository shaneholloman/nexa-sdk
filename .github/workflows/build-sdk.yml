name: Build SDK

on:
  workflow_call:
    inputs:
      platform:
        description: "Target platform: linux-arm64, android-arm64 or windows-arm64"
        required: true
        type: string
      runner:
        description: "Runner label"
        required: true
        type: string
      upload_artifact:
        description: "Whether to upload SDK artifact"
        required: false
        type: boolean
        default: false
      extra_cmake_flags:
        description: "Additional CMake flags"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build-sdk:
    name: build-sdk
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 120

    steps:
      - name: Configure Windows Git
        if: inputs.platform == 'windows-arm64'
        shell: cmd
        run: |
          echo C:\Program Files\Git\bin>>%GITHUB_PATH%
          git config --global core.longpaths true
          git config --global core.protectNTFS false
          git config --global core.fscache true
          git config --global core.preloadindex true

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Detect build version
        id: version
        uses: ./.github/actions/version

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-sdk-${{ inputs.platform }}-${{ github.sha }}
          restore-keys: ccache-sdk-${{ inputs.platform }}-

      - name: Install and configure ccache (Linux)
        if: inputs.platform == 'linux-arm64'
        shell: bash
        run: |
          command -v ccache || sudo apt-get install -y ccache
          echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> $GITHUB_ENV
          ccache --max-size=1G

      # Android builds run inside a docker container; ccache is installed there.
      # Host only needs to own the cache directory so actions/cache persists it.
      - name: Prepare ccache dir (Android)
        if: inputs.platform == 'android-arm64'
        shell: bash
        run: mkdir -p "${{ github.workspace }}/.ccache"

      - name: Install and configure ccache (Windows)
        if: inputs.platform == 'windows-arm64'
        shell: powershell
        run: |
          if (-not (Get-Command ccache -ErrorAction SilentlyContinue)) {
            choco install ccache --no-progress -y
          }
          Add-Content $env:GITHUB_ENV "CCACHE_DIR=${{ github.workspace }}/.ccache"
          ccache --max-size=1G

      - name: Setup Snapdragon SDKs
        if: inputs.platform == 'windows-arm64'
        uses: ./.github/actions/setup-snapdragon-sdks

      - name: Configure HTP signing cert
        if: inputs.platform == 'windows-arm64'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $src = "$env:GITHUB_WORKSPACE\.github\certs\hexagon\ggml-htp-v1.pfx"
          $dst = "$env:RUNNER_TEMP\ggml-htp-v1.pfx"
          Copy-Item $src $dst -Force
          Add-Content -Path $env:GITHUB_ENV -Value "HEXAGON_HTP_CERT=$dst"
          Write-Host "HEXAGON_HTP_CERT=$dst"

      - name: Build SDK (Linux)
        if: inputs.platform == 'linux-arm64'
        shell: bash
        env:
          GENIEX_VERSION: ${{ steps.version.outputs.version }}
          PLATFORM: linux-arm64
          EXTRA_CMAKE_FLAGS: ${{ inputs.extra_cmake_flags }}
        run: bash .github/scripts/ci/build-sdk.sh

      - name: Build SDK (Android, Snapdragon toolchain container)
        if: inputs.platform == 'android-arm64'
        shell: bash
        env:
          GENIEX_VERSION: ${{ steps.version.outputs.version }}
          EXTRA_CMAKE_FLAGS: ${{ inputs.extra_cmake_flags }}
        run: |
          set -euo pipefail
          # Run as root so we can apt-install make/gcc/ccache and rustup
          # toolchain, then chown outputs back to the runner user so
          # actions/upload-artifact and actions/cache can read them. Mirrors
          # the setup documented in docs/build.md for this container.
          uid="$(id -u)"
          gid="$(id -g)"
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e GENIEX_VERSION \
            -e EXTRA_CMAKE_FLAGS \
            -e PLATFORM=android-arm64 \
            -e CCACHE_DIR=/workspace/.ccache \
            -e HOST_UID="$uid" \
            -e HOST_GID="$gid" \
            --platform linux/amd64 \
            ghcr.io/snapdragon-toolchain/arm64-android:v0.3 \
            bash -eux -c '
              git config --global --add safe.directory "*"
              apt-get update -y
              # build-essential (not just gcc) is required because Rust build
              # scripts in tokenizers-cpp link host-native executables and need
              # Scrt1.o / crti.o / crtn.o / libc from libc6-dev.
              apt-get install -y --no-install-recommends build-essential ccache curl ca-certificates
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
              export PATH="$HOME/.cargo/bin:$PATH"
              rustup target add aarch64-linux-android
              bash .github/scripts/ci/build-sdk.sh
              chown -R "$HOST_UID:$HOST_GID" sdk .ccache || true
            '

      - name: Setup VS toolchain (Windows)
        if: inputs.platform == 'windows-arm64'
        uses: ./.github/actions/setup-vcvars

      - name: Build SDK (Windows)
        if: inputs.platform == 'windows-arm64'
        shell: powershell
        env:
          GENIEX_VERSION: ${{ steps.version.outputs.version }}
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .github/scripts/ci/build-sdk.ps1

      - name: Upload SDK artifact
        if: inputs.upload_artifact
        uses: actions/upload-artifact@v5
        with:
          name: sdk-pkg-${{ inputs.platform }}
          path: sdk/pkg-geniex/
          retention-days: 1
