name: Build

on:
  pull_request:
    branches: [master]
    paths:
      - "sdk/**"
      - "cli/**"
      - "bindings/python/**"
      - "bindings/go/**"
      - ".github/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  # SDK matrix. linux-arm64 and android-arm64 are cross-compiled from
  # x64 Linux hosts; rows are kept commented-out until the cross-compile
  # paths land in build-sdk.yml / .github/scripts/ci/build-sdk.sh.
  build-sdk:
    name: build-sdk (${{ matrix.platform }})
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-arm64
            runner: windows-arm64
          # - platform: linux-arm64     # cross-compile from x64 Linux; placeholder
          #   runner: ubuntu-latest
          # - platform: android-arm64   # cross-compile from x64 Linux; placeholder
          #   runner: ubuntu-latest
    uses: ./.github/workflows/build-sdk.yml
    secrets: inherit
    with:
      platform: ${{ matrix.platform }}
      runner: ${{ matrix.runner }}
      upload_artifact: true

  build-python-sdist:
    name: build-python-sdist
    needs: [lint]
    uses: ./.github/workflows/build-python-sdist.yml
    secrets: inherit
    with:
      runner: ubuntu-latest
      upload_artifact: true

  build-cli:
    name: build-cli (${{ matrix.platform }})
    needs: [build-sdk]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-arm64
            runner: windows-arm64
    uses: ./.github/workflows/build-cli.yml
    secrets: inherit
    with:
      platform: ${{ matrix.platform }}
      runner: ${{ matrix.runner }}
