  #     runner: larger-runner
  #     upload_artifact: true
  #
  # build-cli-linux:
  #   name: build-cli-linux
  #   needs: [build-sdk-linux]
  #   uses: ./.github/workflows/reusable-build-cli.yml
  #   secrets: inherit
  #   with:
  #     platform: linux-arm64
  #     runner: larger-runner
  #
  # build-python-linux:
  #   name: build-python-linux
  #   needs: [build-sdk-linux]
  #   uses: ./.github/workflows/reusable-build-python.yml
  #   secrets: inherit
  #   with:
  #     platform: linux-arm64
  #     runner: larger-runner

  # --- Windows pipeline ---
  build-sdk-windows:
    name: build-sdk-windows
    needs: [lint]
    uses: ./.github/workflows/reusable-build-sdk.yml
    secrets: inherit
    with:
      platform: windows-arm64
      runner: windows-arm64
      upload_artifact: true

  build-cli-windows:
    name: build-cli-windows
    needs: [build-sdk-windows]
    uses: ./.github/workflows/reusable-build-cli.yml
    secrets: inherit
    with:
      platform: windows-arm64
      runner: windows-arm64

