name: Build

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review]
    paths:
      - "sdk/**"
      - "cli/**"
      - "bindings/python/**"
      - "bindings/go/**"
      - "bindings/android/**"
      - ".github/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  # SDK matrix. linux-arm64 is cross-compiled from x64 Linux and remains
  # commented-out until a dedicated use case requires it.
  build-sdk:
    name: build-sdk (${{ matrix.platform }})
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-arm64
            runner: windows-arm64
          - platform: android-arm64
            runner: ubuntu-latest
          # - platform: linux-arm64     # cross-compile from x64 Linux; placeholder
          #   runner: ubuntu-latest
    uses: ./.github/workflows/build-sdk.yml
    secrets: inherit
    with:
      platform: ${{ matrix.platform }}
      runner: ${{ matrix.runner }}
      upload_artifact: true

  build-python-sdist:
    name: build-python-sdist
    needs: [lint]
    uses: ./.github/workflows/build-python-sdist.yml
    secrets: inherit
    with:
      runner: ubuntu-latest
      upload_artifact: true

  build-cli:
    name: build-cli (${{ matrix.platform }})
    needs: [build-sdk]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-arm64
            runner: windows-arm64
    uses: ./.github/workflows/build-cli.yml
    secrets: inherit
    with:
      platform: ${{ matrix.platform }}
      runner: ${{ matrix.runner }}

  build-android-aar:
    name: build-android-aar
    needs: [build-sdk]
    uses: ./.github/workflows/build-android-aar.yml
    secrets: inherit
    with:
      runner: ubuntu-latest
      upload_artifact: true
