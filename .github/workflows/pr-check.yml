name: PR Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review]
    paths:
      - "sdk/**"
      - "cli/**"
      - "bindings/**"
      - "tests/**"
      - "third-party/**"
      - ".gitmodules"
      - ".github/**"
      - "*bazel*"
  # Seeds ccache on main so the first PR run off a new base hits warm.
  push:
    branches: [main]
    paths:
      - "sdk/**"
      - "third-party/**"
      - ".gitmodules"
      - ".github/**"
      - "*bazel*"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Draft PRs run lint only; ready_for_review triggers the full graph.
jobs:
  lint:
    name: lint
    uses: ./.github/workflows/_lint.yml
    secrets: inherit

  build-sdk:
    name: build-sdk
    needs: [lint]
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    uses: ./.github/workflows/_build-sdk.yml
    secrets: inherit
    with:
      upload_artifact: true

  build-python-sdist:
    name: build-python-sdist
    needs: [lint]
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    uses: ./.github/workflows/_build-python-sdist.yml
    secrets: inherit
    with:
      upload_artifact: true

  build-cli:
    name: build-cli
    needs: [build-sdk]
    uses: ./.github/workflows/_build-cli.yml
    secrets: inherit
    with:
      upload_artifact: true

  build-android-aar:
    name: build-android-aar
    needs: [build-sdk]
    uses: ./.github/workflows/_build-android-aar.yml
    secrets: inherit
    with:
      upload_artifact: true

  build-android-apk:
    name: build-android-apk
    needs: [build-sdk]
    uses: ./.github/workflows/_build-android-apk.yml
    secrets: inherit
    with:
      upload_artifact: true

  build-docker:
    name: build-docker
    needs: [build-sdk]
    uses: ./.github/workflows/_build-docker.yml
    secrets: inherit
    with:
      push: false

  go-test:
    name: go-test
    needs: [build-sdk]
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    uses: ./.github/workflows/_test.yml
    secrets: inherit
    with:
      language: go
      gate_on_changed_files: true

  python-pytest:
    name: python-pytest
    needs: [build-sdk]
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    uses: ./.github/workflows/_test.yml
    secrets: inherit
    with:
      language: python
      gate_on_changed_files: true

  sdk-pytest:
    name: sdk-pytest
    needs: [build-sdk]
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    uses: ./.github/workflows/_test.yml
    secrets: inherit
    with:
      language: sdk
      # Linux currently can't run the llama_cpp plugin tests (libOpenCL.so.1
      # missing in the ubuntu:24.04 toolchain image). Re-enable linux-arm64
      # once the plugin can dlopen without an OpenCL ICD on the host.
      platforms: '["windows-arm64"]'
      gate_on_changed_files: true
