name: PR Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review]
    paths:
      - "sdk/**"
      - "cli/**"
      - "bindings/python/**"
      - "bindings/go/**"
      - "bindings/android/**"
      - ".github/**"
  # Seed per-platform ccache entries on main so first-time PR runs hit the
  # restore-keys prefix (scoped to base branch) instead of cold-compiling.
  push:
    branches: [main]
    paths:
      - "sdk/**"
      - "cli/**"
      - "bindings/python/**"
      - "bindings/go/**"
      - "bindings/android/**"
      - ".github/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  build-sdk:
    name: build-sdk (${{ matrix.platform }})
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-arm64
            runner: windows-arm64
          - platform: linux-arm64
            runner: ubuntu-latest
          - platform: android-arm64
            runner: ubuntu-latest
    uses: ./.github/workflows/_build-sdk.yml
    secrets: inherit
    with:
      platform: ${{ matrix.platform }}
      runner: ${{ matrix.runner }}
      upload_artifact: true

  build-python-sdist:
    name: build-python-sdist
    needs: [lint]
    uses: ./.github/workflows/_build-python-sdist.yml
    secrets: inherit
    with:
      runner: ubuntu-latest
      upload_artifact: true

  build-cli:
    name: build-cli (${{ matrix.platform }})
    needs: [build-sdk]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-arm64
            runner: windows-arm64
          - platform: linux-arm64
            runner: linux-arm64
    uses: ./.github/workflows/_build-cli.yml
    secrets: inherit
    with:
      platform: ${{ matrix.platform }}
      runner: ${{ matrix.runner }}
      upload_artifact: true

  build-android-aar:
    name: build-android-aar
    needs: [build-sdk]
    uses: ./.github/workflows/_build-android-aar.yml
    secrets: inherit
    with:
      runner: ubuntu-latest
      upload_artifact: true

  build-docker:
    name: build-docker (linux-arm64)
    needs: [build-cli]
    uses: ./.github/workflows/_build-docker.yml
    secrets: inherit
    with:
      runner: linux-arm64
      push: false
