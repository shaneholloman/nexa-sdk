name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # SDK matrix. linux-arm64 / android-arm64 are cross-compiled from x64 Linux;
  # placeholders kept commented-out until the cross-compile paths land.
  build-sdk:
    name: build-sdk (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-arm64
            runner: windows-arm64
          # - platform: linux-arm64
          #   runner: ubuntu-latest
          # - platform: android-arm64
          #   runner: ubuntu-latest
    uses: ./.github/workflows/build-sdk.yml
    secrets: inherit
    with:
      platform: ${{ matrix.platform }}
      runner: ${{ matrix.runner }}
      upload_artifact: true

  build-python-sdist:
    name: build-python-sdist
    uses: ./.github/workflows/build-python-sdist.yml
    secrets: inherit
    with:
      runner: ubuntu-latest
      upload_artifact: true

  build-cli:
    name: build-cli (${{ matrix.platform }})
    needs: [build-sdk]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-arm64
            runner: windows-arm64
            build_installer: true
    uses: ./.github/workflows/build-cli.yml
    secrets: inherit
    with:
      platform: ${{ matrix.platform }}
      runner: ${{ matrix.runner }}
      build_installer: ${{ matrix.build_installer }}
      upload_artifact: true

  publish-github-release:
    name: publish-github-release
    runs-on: ubuntu-latest
    needs:
      - build-sdk
      - build-cli
      - build-python-sdist
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Validate release tag (SemVer 2.0)
        run: |
          set -euo pipefail
          semver='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*))*))?(\+([0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*))?$'
          [[ "${RELEASE_TAG}" =~ $semver ]] || { echo "Invalid SemVer 2.0 tag: ${RELEASE_TAG}"; exit 1; }

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/download-artifact@v5
        with:
          name: sdk-pkg-windows-arm64
          path: sdk-pkg-windows-arm64

      - uses: actions/download-artifact@v5
        with:
          name: geniex-cli-installer-windows-arm64
          path: .

      - uses: actions/download-artifact@v5
        with:
          name: geniex-python-sdist
          path: .

      - name: Probe Microsoft-signed HTP bundle on S3
        id: htp
        run: |
          set -euo pipefail
          LLAMA_SHA=$(git -C third-party/llama.cpp rev-parse --short=6 HEAD)
          SIGNED_URL="https://qaihub-public-assets.s3.us-west-2.amazonaws.com/llama-cpp/libggml-htp-${LLAMA_SHA}.zip"
          HTTP=$(curl -sS -o libggml-htp-signed.zip -w '%{http_code}' "$SIGNED_URL" || echo "000")
          if [[ "$HTTP" == "200" ]]; then
            echo "Signed HTP bundle found for llama.cpp @ ${LLAMA_SHA}"
            unzip -o libggml-htp-signed.zip -d sdk-pkg-windows-arm64/lib/llama_cpp/
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No signed HTP bundle for llama.cpp @ ${LLAMA_SHA} (HTTP $HTTP); falling back to self-signed"
            rm -f libggml-htp-signed.zip
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "llama_sha=${LLAMA_SHA}" >> "$GITHUB_OUTPUT"

      - name: Package artifacts and write SHA256 sidecars
        id: assets
        env:
          HTP_SIGNED: ${{ steps.htp.outputs.signed }}
          LLAMA_SHA: ${{ steps.htp.outputs.llama_sha }}
        run: |
          set -euo pipefail
          mv geniex-cli-setup.exe "geniex-cli-installer-windows-arm64-${RELEASE_TAG}.exe"
          if [[ "$HTP_SIGNED" == "true" ]]; then
            zip -r "geniex-sdk-windows-arm64-${RELEASE_TAG}.zip" sdk-pkg-windows-arm64
            files=$(ls *.zip *.exe *.tar.gz)
          else
            zip -r "geniex-sdk-windows-arm64-${RELEASE_TAG}-selfsigned.zip" sdk-pkg-windows-arm64
            # Ship the self-signed public cert so end users can add it to
            # Trusted Root + Trusted Publishers on WoS devices.
            cp .github/certs/hexagon/ggml-htp-v1.cer ggml-htp-v1.cer
            # Bundle the HTP files an operator needs to send for Microsoft signing.
            # Includes the self-signed .cat as a structural reference; the signer
            # will regenerate and re-sign it.
            mkdir to-sign
            cp sdk-pkg-windows-arm64/lib/llama_cpp/libggml-htp-v68.so to-sign/
            cp sdk-pkg-windows-arm64/lib/llama_cpp/libggml-htp-v69.so to-sign/
            cp sdk-pkg-windows-arm64/lib/llama_cpp/libggml-htp-v73.so to-sign/
            cp sdk-pkg-windows-arm64/lib/llama_cpp/libggml-htp-v75.so to-sign/
            cp sdk-pkg-windows-arm64/lib/llama_cpp/libggml-htp-v79.so to-sign/
            cp sdk-pkg-windows-arm64/lib/llama_cpp/libggml-htp-v81.so to-sign/
            cp third-party/llama.cpp/ggml/src/ggml-hexagon/libggml-htp.inf to-sign/
            cp sdk-pkg-windows-arm64/lib/llama_cpp/libggml-htp.cat to-sign/
            (cd to-sign && zip -r "../libggml-htp-to-sign-${LLAMA_SHA}.zip" .)
            files=$(ls *.zip *.exe *.cer *.tar.gz)
          fi
          # Per-file .sha256 sidecars (one hash per file) — friendlier for
          # winget manifests and download-script consumers than a combined sums file.
          for f in $files; do sha256sum "$f" > "$f.sha256"; done
          {
            echo "files<<EOF"
            echo "$files"
            for f in $files; do echo "$f.sha256"; done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: actions/github-script@v8
        env:
          VERSION: ${{ env.RELEASE_TAG }}
          FILES: ${{ steps.assets.outputs.files }}
          HTP_SIGNED: ${{ steps.htp.outputs.signed }}
          LLAMA_SHA: ${{ steps.htp.outputs.llama_sha }}
        with:
          script: |
            const release = require('./.github/scripts/release.js');
            await release({ github, context, core });

  # Push the sdist to TestPyPI for pre-release tags (v*-alpha.*, v*-beta.*,
  # v*-rc.*). Stable tags skip this job — they go to production PyPI via a
  # separate flow (not yet wired up).
  publish-testpypi:
    name: publish-testpypi
    runs-on: ubuntu-latest
    needs: [build-python-sdist]
    if: contains(github.event.inputs.release_tag || github.ref_name, '-')
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: geniex-python-sdist
          path: dist/

      - name: Publish sdist to TestPyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          packages-dir: dist/
          skip-existing: true
