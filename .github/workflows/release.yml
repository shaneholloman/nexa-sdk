name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-tag:
    name: resolve-tag
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      is_prerelease: ${{ steps.resolve.outputs.is_prerelease }}
    steps:
      - id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          semver='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*))*))?(\+([0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*))?$'
          [[ "${TAG}" =~ $semver ]] || { echo "::error::Invalid SemVer 2.0 tag: ${TAG}"; exit 1; }

          # workflow_dispatch runs against GITHUB_SHA = the ref the workflow
          # was launched from. If that's not the tag's commit, downstream
          # _build-* jobs will check out the wrong source and stamp it as
          # ${TAG} — which we cannot move (tags are immutable).
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            ref_obj=$(gh api "repos/${GH_REPO}/git/ref/tags/${TAG}" 2>/dev/null) \
              || { echo "::error::Tag ${TAG} not found on origin"; exit 1; }
            tag_sha=$(jq -r '.object.sha' <<<"${ref_obj}")
            tag_type=$(jq -r '.object.type' <<<"${ref_obj}")
            if [[ "${tag_type}" == "tag" ]]; then
              tag_sha=$(gh api "repos/${GH_REPO}/git/tags/${tag_sha}" --jq '.object.sha')
            fi
            if [[ "${tag_sha}" != "${GITHUB_SHA}" ]]; then
              echo "::error::Dispatch ref ${GITHUB_SHA} != tag ${TAG} (${tag_sha}). Re-run from the tag ref: Actions → Release → Run workflow → Use workflow from → Tags → ${TAG}."
              exit 1
            fi
          fi

          # Stable tags are immutable once they've shipped assets; prereleases
          # (hyphen-bearing) may be re-cut. An existing stable release with no
          # assets is a placeholder (e.g. created empty via the UI before the
          # workflow ran) — let the workflow populate it instead of erroring.
          if [[ "${TAG}" == *-* ]]; then
            is_prerelease=true
          else
            is_prerelease=false
            asset_count=$(gh release view "${TAG}" --json assets --jq '.assets | length' 2>/dev/null || echo "none")
            if [[ "${asset_count}" != "none" && "${asset_count}" -gt 0 ]]; then
              echo "::error::Stable release ${TAG} already has ${asset_count} asset(s) — refusing to overwrite."
              exit 1
            fi
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${is_prerelease}" >> "$GITHUB_OUTPUT"

  build-sdk:
    name: build-sdk
    needs: [resolve-tag]
    uses: ./.github/workflows/_build-sdk.yml
    secrets: inherit
    with:
      version_tag: ${{ needs.resolve-tag.outputs.tag }}
      upload_artifact: true

  build-android-aar:
    name: build-android-aar
    needs: [build-sdk]
    uses: ./.github/workflows/_build-android-aar.yml
    secrets: inherit
    with:
      upload_artifact: true

  build-android-apk:
    name: build-android-apk
    needs: [build-sdk, build-android-aar]
    uses: ./.github/workflows/_build-android-apk.yml
    secrets: inherit
    with:
      upload_artifact: true

  build-python-sdist:
    name: build-python-sdist
    needs: [resolve-tag]
    uses: ./.github/workflows/_build-python-sdist.yml
    secrets: inherit
    with:
      version_tag: ${{ needs.resolve-tag.outputs.tag }}
      upload_artifact: true

  # Overlay the Microsoft-signed HTP bundle from S3 if available; otherwise
  # the Windows SDK stays self-signed and gets marked as such downstream.
  overlay-htp:
    name: overlay-htp (windows-arm64)
    runs-on: ubuntu-latest
    needs: [build-sdk]
    timeout-minutes: 10
    outputs:
      signed: ${{ steps.htp.outputs.signed }}
      llama_sha: ${{ steps.htp.outputs.llama_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Init llama.cpp submodule
        run: git submodule update --init --depth=1 third-party/llama.cpp

      - uses: actions/download-artifact@v8
        with:
          name: sdk-windows-arm64
          path: sdk-windows-arm64

      - name: Overlay Microsoft-signed HTP bundle from S3 (if available)
        id: htp
        run: |
          set -euo pipefail
          sha=$(git -C third-party/llama.cpp rev-parse --short=6 HEAD)
          url="https://qaihub-public-assets.s3.us-west-2.amazonaws.com/llama-cpp/libggml-htp-${sha}.zip"
          if curl -fsSL -o htp-signed.zip "$url"; then
            unzip -o htp-signed.zip -d sdk-windows-arm64/lib/llama_cpp/
            signed=true
          else
            signed=false
          fi
          rm -f htp-signed.zip
          echo "Signed HTP bundle for llama.cpp @ ${sha}: ${signed}"
          echo "signed=${signed}" >> "$GITHUB_OUTPUT"
          echo "llama_sha=${sha}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: sdk-windows-arm64
          path: sdk-windows-arm64/
          retention-days: 1
          overwrite: true

  build-cli:
    name: build-cli
    needs: [resolve-tag, overlay-htp]
    uses: ./.github/workflows/_build-cli.yml
    secrets: inherit
    with:
      version_tag: ${{ needs.resolve-tag.outputs.tag }}
      build_installer: true
      upload_artifact: true

  # TODO: wire Authenticode signing for the Windows installer (AzureSignTool
  # / ESRP / .pfx secret). Gate publish-github-release + publish-winget on it.
  sign-windows:
    name: sign-windows
    needs: [build-cli]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: 'echo "TODO: sign cli-setup-windows-arm64."'

  # Assemble every release asset into one release-assets artifact so
  # publish-github-release and publish-s3 can run in parallel.
  package-release:
    name: package-release
    needs:
      - resolve-tag
      - overlay-htp
      - build-cli
      - build-python-sdist
      - build-android-aar
      - build-android-apk
      - sign-windows
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
      HTP_SIGNED: ${{ needs.overlay-htp.outputs.signed }}
      LLAMA_SHA: ${{ needs.overlay-htp.outputs.llama_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      # Needed for the self-signed HTP path (pulls libggml-htp.inf from llama.cpp).
      - name: Init llama.cpp submodule
        if: needs.overlay-htp.outputs.signed != 'true'
        run: git submodule update --init --depth=1 third-party/llama.cpp

      - uses: actions/download-artifact@v8
        with:
          name: sdk-windows-arm64
          path: sdk-windows-arm64

      - uses: actions/download-artifact@v8
        with:
          name: sdk-linux-arm64
          path: sdk-linux-arm64

      - uses: actions/download-artifact@v8
        with:
          name: sdk-android-arm64
          path: sdk-android-arm64

      - uses: actions/download-artifact@v8
        with:
          name: cli-setup-windows-arm64
          path: .

      - uses: actions/download-artifact@v8
        with:
          name: cli-linux-arm64
          path: cli-linux-arm64/

      - uses: actions/download-artifact@v8
        with:
          name: python-sdist
          path: .

      - uses: actions/download-artifact@v8
        with:
          name: android-aar
          path: .

      - uses: actions/download-artifact@v8
        with:
          name: android-apk
          path: .

      - name: Package artifacts and write SHA256 sidecars
        run: |
          set -euo pipefail
          HTP_DIR=sdk-windows-arm64/lib/llama_cpp

          mv geniex-cli-setup.exe "geniex-cli-setup-windows-arm64-${RELEASE_TAG}.exe"
          mv geniex-android-aar.aar "geniex-android-aar-${RELEASE_TAG}.aar"
          mv geniex-demo.apk "geniex-demo-${RELEASE_TAG}.apk"

          staged="geniex-cli-linux-arm64-${RELEASE_TAG}"
          mkdir -p "${staged}"
          unzip -q cli-linux-arm64/artifact.zip -d "${staged}"
          chmod +x "${staged}/geniex"
          tar -czf "${staged}.tar.gz" "${staged}"
          rm -rf "${staged}"

          # Stage the install script as a versioned release asset so users can
          # pin to a specific tag's script — the mutable install.sh pointer is
          # advanced only on stable tags (see publish-s3 below).
          cp cli/release/linux/install.sh "install-${RELEASE_TAG}.sh"

          sdk_suffix=""
          if [[ "$HTP_SIGNED" != "true" ]]; then
            sdk_suffix="-selfsigned"
            # Ship cert (users import) + to-sign bundle (operator finishes out-of-band).
            cp .github/certs/hexagon/ggml-htp-v1.cer .
            mkdir to-sign
            cp "$HTP_DIR"/libggml-htp-v*.so to-sign/
            cp "$HTP_DIR"/libggml-htp.cat to-sign/
            cp third-party/llama.cpp/ggml/src/ggml-hexagon/libggml-htp.inf to-sign/
            (cd to-sign && zip -r "../libggml-htp-to-sign-${LLAMA_SHA}.zip" .)
          fi
          zip -r "geniex-sdk-windows-arm64-${RELEASE_TAG}${sdk_suffix}.zip" sdk-windows-arm64
          zip -r "geniex-sdk-linux-arm64-${RELEASE_TAG}.zip" sdk-linux-arm64

          # Package standalone geniex-bench archives (bin + runtime libs).
          for plat in linux-arm64 windows-arm64 android-arm64; do
            src="sdk-${plat}"
            bench_dir="geniex-bench-${plat}-${RELEASE_TAG}"
            mkdir -p "${bench_dir}/bin" "${bench_dir}/lib"
            if [[ "$plat" == "windows-arm64" ]]; then
              cp "${src}/bin/geniex-bench.exe" "${bench_dir}/bin/"
              cp "${src}"/lib/*.dll "${bench_dir}/lib/" 2>/dev/null || true
            else
              cp "${src}/bin/geniex-bench" "${bench_dir}/bin/"
              chmod +x "${bench_dir}/bin/geniex-bench"
              cp "${src}"/lib/*.so "${bench_dir}/lib/" 2>/dev/null || true
            fi
            # Include plugin libs (llama_cpp / qairt subdirs).
            cp -r "${src}"/lib/llama_cpp "${bench_dir}/lib/" 2>/dev/null || true
            cp -r "${src}"/lib/qairt "${bench_dir}/lib/" 2>/dev/null || true
            if [[ "$plat" == "windows-arm64" ]]; then
              zip -r "${bench_dir}.zip" "${bench_dir}"
            else
              tar -czf "${bench_dir}.tar.gz" "${bench_dir}"
            fi
            rm -rf "${bench_dir}"
          done

          rm -rf sdk-windows-arm64 sdk-linux-arm64 sdk-android-arm64 cli-linux-arm64 to-sign

          shopt -s nullglob
          files=(*.zip *.exe *.tar.gz *.cer *.aar *.apk install-*.sh)
          for f in "${files[@]}"; do sha256sum "$f" > "$f.sha256"; done

      - uses: actions/upload-artifact@v7
        with:
          name: release-assets
          path: |
            *.zip
            *.zip.sha256
            *.exe
            *.exe.sha256
            *.tar.gz
            *.tar.gz.sha256
            *.cer
            *.cer.sha256
            *.aar
            *.aar.sha256
            *.apk
            *.apk.sha256
            install-*.sh
            install-*.sh.sha256
          if-no-files-found: error
          retention-days: 1

  publish-github-release:
    name: publish-github-release
    needs: [resolve-tag, overlay-htp, package-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: .

      - name: Collect file list
        id: assets
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(*.zip *.zip.sha256 *.exe *.exe.sha256 *.tar.gz *.tar.gz.sha256 *.cer *.cer.sha256 *.aar *.aar.sha256 *.apk *.apk.sha256)
          {
            echo "files<<EOF"
            for f in "${files[@]}"; do echo "$f"; done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: actions/github-script@v9
        env:
          VERSION: ${{ needs.resolve-tag.outputs.tag }}
          FILES: ${{ steps.assets.outputs.files }}
          HTP_SIGNED: ${{ needs.overlay-htp.outputs.signed }}
          LLAMA_SHA: ${{ needs.overlay-htp.outputs.llama_sha }}
        with:
          script: |
            const release = require('./.github/scripts/release.js');
            await release({ github, context, core });

  publish-s3:
    name: publish-s3
    needs: [resolve-tag, overlay-htp, package-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
      IS_PRERELEASE: ${{ needs.resolve-tag.outputs.is_prerelease }}
      HTP_SIGNED: ${{ needs.overlay-htp.outputs.signed }}
      LLAMA_SHA: ${{ needs.overlay-htp.outputs.llama_sha }}
      S3_BUCKET: qaihub-public-assets
      S3_PREFIX: qai-hub-geniex/
      PUBLIC_BASE_URL: https://qaihub-public-assets.s3.us-west-2.amazonaws.com
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      # Pin so the manifest scripts below don't rely on the runner image's `python` alias.
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: release-assets

      - name: Configure AWS credentials (bitsyfactory role)
        uses: ./.github/actions/configure-multiple-aws-roles
        with:
          profile: bitsy
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::234967179373:role/github-bitsyfactory
          role-session-name: geniex-release-${{ github.run_id }}

      - name: Upload versioned release assets to S3 (flat)
        shell: bash
        env:
          AWS_PROFILE: bitsy
          AWS_DEFAULT_REGION: us-west-2
        run: |
          set -euo pipefail
          # Flat layout under qai-hub-geniex/ — the <tag> in every filename
          # disambiguates versions. SDK zips, CLI installer (+ .sha256), and
          # APK (+ .sha256) all land at the prefix root. --acl public-read is
          # required because the bucket policy only opens qai-hub-models/wheels
          # for anonymous GetObject by default.
          aws s3 sync release-assets/ "s3://${S3_BUCKET}/${S3_PREFIX}" \
            --exclude '*' \
            --include 'geniex-sdk-windows-arm64-*.zip' \
            --include 'geniex-sdk-windows-arm64-*.zip.sha256' \
            --include 'geniex-sdk-linux-arm64-*.zip' \
            --include 'geniex-sdk-linux-arm64-*.zip.sha256' \
            --include 'geniex-bench-linux-arm64-*.tar.gz' \
            --include 'geniex-bench-linux-arm64-*.tar.gz.sha256' \
            --include 'geniex-bench-android-arm64-*.tar.gz' \
            --include 'geniex-bench-android-arm64-*.tar.gz.sha256' \
            --include 'geniex-bench-windows-arm64-*.zip' \
            --include 'geniex-bench-windows-arm64-*.zip.sha256' \
            --include "geniex-cli-setup-windows-arm64-${RELEASE_TAG}.exe" \
            --include "geniex-cli-setup-windows-arm64-${RELEASE_TAG}.exe.sha256" \
            --include "geniex-cli-linux-arm64-${RELEASE_TAG}.tar.gz" \
            --include "geniex-cli-linux-arm64-${RELEASE_TAG}.tar.gz.sha256" \
            --include "install-${RELEASE_TAG}.sh" \
            --include "install-${RELEASE_TAG}.sh.sha256" \
            --include "geniex-demo-${RELEASE_TAG}.apk" \
            --include "geniex-demo-${RELEASE_TAG}.apk.sha256" \
            --acl public-read

      - name: Force text/x-shellscript content-type on the install scripts
        shell: bash
        env:
          AWS_PROFILE: bitsy
          AWS_DEFAULT_REGION: us-west-2
        run: |
          set -euo pipefail
          # Re-upload the .sh objects so curl-piping browsers don't get a
          # text/html or application/octet-stream that some shells refuse.
          aws s3 cp \
            "release-assets/install-${RELEASE_TAG}.sh" \
            "s3://${S3_BUCKET}/${S3_PREFIX}install-${RELEASE_TAG}.sh" \
            --content-type "text/x-shellscript; charset=utf-8" \
            --acl public-read

      - name: Refresh mutable "latest stable" pointers
        if: ${{ needs.resolve-tag.outputs.is_prerelease != 'true' }}
        shell: bash
        env:
          AWS_PROFILE: bitsy
          AWS_DEFAULT_REGION: us-west-2
        run: |
          set -euo pipefail
          # Only advance the unversioned pointers on bare vX.Y.Z so rc/alpha
          # builds never become the default download. Cache-Control no-cache
          # forces revalidation since the bytes change each release.
          aws s3 cp \
            "release-assets/geniex-cli-setup-windows-arm64-${RELEASE_TAG}.exe" \
            "s3://${S3_BUCKET}/${S3_PREFIX}geniex-cli.exe" \
            --acl public-read \
            --cache-control "no-cache, max-age=0"
          aws s3 cp \
            "release-assets/geniex-cli-linux-arm64-${RELEASE_TAG}.tar.gz" \
            "s3://${S3_BUCKET}/${S3_PREFIX}geniex-cli-linux-arm64.tar.gz" \
            --acl public-read \
            --cache-control "no-cache, max-age=0"
          aws s3 cp \
            "release-assets/geniex-cli-linux-arm64-${RELEASE_TAG}.tar.gz.sha256" \
            "s3://${S3_BUCKET}/${S3_PREFIX}geniex-cli-linux-arm64.tar.gz.sha256" \
            --acl public-read \
            --cache-control "no-cache, max-age=0"
          aws s3 cp \
            "release-assets/install-${RELEASE_TAG}.sh" \
            "s3://${S3_BUCKET}/${S3_PREFIX}install.sh" \
            --content-type "text/x-shellscript; charset=utf-8" \
            --acl public-read \
            --cache-control "no-cache, max-age=0"
          aws s3 cp \
            "release-assets/geniex-demo-${RELEASE_TAG}.apk" \
            "s3://${S3_BUCKET}/${S3_PREFIX}geniex-demo.apk" \
            --acl public-read \
            --cache-control "no-cache, max-age=0"
          # geniex-bench latest pointers (one per platform).
          aws s3 cp \
            "release-assets/geniex-bench-linux-arm64-${RELEASE_TAG}.tar.gz" \
            "s3://${S3_BUCKET}/${S3_PREFIX}geniex-bench-linux-arm64.tar.gz" \
            --acl public-read \
            --cache-control "no-cache, max-age=0"
          aws s3 cp \
            "release-assets/geniex-bench-android-arm64-${RELEASE_TAG}.tar.gz" \
            "s3://${S3_BUCKET}/${S3_PREFIX}geniex-bench-android-arm64.tar.gz" \
            --acl public-read \
            --cache-control "no-cache, max-age=0"
          aws s3 cp \
            "release-assets/geniex-bench-windows-arm64-${RELEASE_TAG}.zip" \
            "s3://${S3_BUCKET}/${S3_PREFIX}geniex-bench-windows-arm64.zip" \
            --acl public-read \
            --cache-control "no-cache, max-age=0"

      - name: Generate manifest files
        shell: bash
        env:
          AWS_PROFILE: bitsy
          AWS_DEFAULT_REGION: us-west-2
          RELEASE_ASSETS_DIR: release-assets
          OUTPUT_DIR: manifests
        run: |
          set -euo pipefail
          python .github/scripts/release_s3_manifest.py build-tag-manifest
          python .github/scripts/release_s3_manifest.py update-index
          python .github/scripts/release_s3_manifest.py build-latest

      - name: Upload manifest files to S3
        shell: bash
        env:
          AWS_PROFILE: bitsy
          AWS_DEFAULT_REGION: us-west-2
        run: |
          set -euo pipefail
          # Per-tag manifest is immutable: the tag itself never changes (it's a
          # project hard constraint), and the script preserves released_at on
          # re-runs, so byte-identical contents can be cached forever.
          aws s3 cp "manifests/manifest-${RELEASE_TAG}.json" \
            "s3://${S3_BUCKET}/${S3_PREFIX}manifest-${RELEASE_TAG}.json" \
            --content-type application/json \
            --acl public-read \
            --cache-control "public, max-age=31536000, immutable"
          # index.json is mutable — every release adds a row. no-cache so apps
          # see new versions immediately.
          aws s3 cp manifests/index.json \
            "s3://${S3_BUCKET}/${S3_PREFIX}index.json" \
            --content-type application/json \
            --acl public-read \
            --cache-control "no-cache, max-age=0"
          # latest.json only on stable tags — the build-latest subcommand is a
          # no-op for prereleases and won't produce the file.
          if [[ -f manifests/latest.json ]]; then
            aws s3 cp manifests/latest.json \
              "s3://${S3_BUCKET}/${S3_PREFIX}latest.json" \
              --content-type application/json \
              --acl public-read \
              --cache-control "no-cache, max-age=0"
          fi

  publish-docker:
    name: publish-docker
    needs: [resolve-tag, build-sdk]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_build-docker.yml
    secrets: inherit
    with:
      version_tag: ${{ needs.resolve-tag.outputs.tag }}
      push: true
      image: ghcr.io/qcom-ai-hub/geniex-cli
      tag: ${{ needs.resolve-tag.outputs.tag }}
      is_prerelease: ${{ needs.resolve-tag.outputs.is_prerelease == 'true' }}

  publish-testpypi:
    name: publish-testpypi
    needs: [resolve-tag, build-python-sdist]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-sdist
          path: dist/

      - name: Publish sdist to TestPyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          packages-dir: dist/
          skip-existing: true
          # API-token auth, not Trusted Publishing — attestations are a no-op.
          attestations: false

  # Uploads the AAR to the Sonatype Central Portal under com.qualcomm.qti:geniex-android.
  # Stable tags only. Default publishingType is USER_MANAGED — upload lands in the Portal
  # under PENDING → VALIDATED, and an operator clicks Publish in the UI to go live
  # (Maven Central is immutable, so we keep a human gate on the final button). Flip
  # `publishing_type` to AUTOMATIC once the release pipeline is trusted end-to-end.
  # See maven_upload.md for the manual procedure this job mirrors.
  publish-maven-central:
    name: publish-maven-central
    needs: [resolve-tag, build-android-aar]
    if: needs.resolve-tag.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
      GROUP_ID: com.qualcomm.qti
      ARTIFACT_ID: geniex-android
      PUBLISHING_TYPE: USER_MANAGED
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: android-aar
          path: .

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          printf '%s\n' "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          printf '%s\n' "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent || true
          # Add trailing newline — GitHub Actions secrets sometimes drop it and
          # armored GPG blocks fail to parse without it.
          printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import
          key_id=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/{print $5; exit}')
          [ -n "$key_id" ] || { echo "::error::No signing key imported from MAVEN_GPG_PRIVATE_KEY"; exit 1; }
          echo "GPG_KEY_ID=${key_id}" >> "$GITHUB_ENV"

      - name: Prepare Maven bundle
        env:
          GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

          group_path="${GROUP_ID//./\/}"
          bundle_dir="maven-bundle/${group_path}/${ARTIFACT_ID}/${VERSION}"
          mkdir -p "${bundle_dir}"
          base="${ARTIFACT_ID}-${VERSION}"

          cp geniex-android-aar.aar "${bundle_dir}/${base}.aar"

          cat > "${bundle_dir}/${base}.pom" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <project xmlns="http://maven.apache.org/POM/4.0.0">
          <modelVersion>4.0.0</modelVersion>
          <groupId>${GROUP_ID}</groupId>
          <artifactId>${ARTIFACT_ID}</artifactId>
          <version>${VERSION}</version>
          <packaging>aar</packaging>
          <name>${ARTIFACT_ID}</name>
          <description>GenieX Android AAR - multi-platform AI inference runtime (Snapdragon / Hexagon).</description>
          <url>https://github.com/qcom-ai-hub/geniex</url>
          <licenses><license><name>Apache License, Version 2.0</name><url>https://www.apache.org/licenses/LICENSE-2.0.txt</url><distribution>repo</distribution></license></licenses>
          <developers><developer><id>qualcomm-aisw</id><name>Qualcomm AISW</name><organization>Qualcomm</organization><organizationUrl>https://www.qualcomm.com</organizationUrl></developer></developers>
          <scm><connection>scm:git:git://github.com/qcom-ai-hub/geniex.git</connection><developerConnection>scm:git:ssh://github.com/qcom-ai-hub/geniex.git</developerConnection><url>https://github.com/qcom-ai-hub/geniex</url></scm>
          </project>
          EOF

          # Stub sources/javadoc jars — Central requires both to exist.
          ( cd "${bundle_dir}" \
            && printf 'Sources not published for this release.\n' > README.txt \
            && zip -q "${base}-sources.jar" README.txt \
            && printf 'Javadoc not published for this release.\n' > README.txt \
            && zip -q "${base}-javadoc.jar" README.txt \
            && rm README.txt )

          for f in \
            "${bundle_dir}/${base}.aar" \
            "${bundle_dir}/${base}.pom" \
            "${bundle_dir}/${base}-sources.jar" \
            "${bundle_dir}/${base}-javadoc.jar"; do
            gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
                --local-user "$GPG_KEY_ID" --armor --detach-sign --output "${f}.asc" "$f"
            md5sum  "$f" | awk '{print $1}' > "${f}.md5"
            sha1sum "$f" | awk '{print $1}' > "${f}.sha1"
          done

          ( cd maven-bundle && zip -qr ../geniex-android-aar-bundle.zip . )
          unzip -l geniex-android-aar-bundle.zip

      - name: Upload bundle to Sonatype Central Portal
        env:
          BEARER: ${{ secrets.MAVEN_CENTRAL_BEARER_TOKEN }}
        run: |
          set -euo pipefail
          http_code=$(curl -sS -o response.txt -w '%{http_code}' -X POST \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=${PUBLISHING_TYPE}&name=${ARTIFACT_ID}-${VERSION}" \
            -H "Authorization: Bearer ${BEARER}" \
            -H "accept: text/plain" \
            -F "bundle=@geniex-android-aar-bundle.zip")
          echo "HTTP ${http_code}"
          cat response.txt; echo
          [ "$http_code" = "201" ] || { echo "::error::Upload failed (HTTP ${http_code})"; exit 1; }
          echo "::notice::Deployment uploaded. Validate + click Publish at https://central.sonatype.com/publishing/deployments"

  # TODO: production PyPI publish for stable tags (needs Trusted Publishing).
