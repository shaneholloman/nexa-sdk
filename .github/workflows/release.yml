name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # SDK matrix. linux-arm64 / android-arm64 are cross-compiled from x64 Linux;
  # placeholders kept commented-out until the cross-compile paths land.
  build-sdk:
    name: build-sdk (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-arm64
            runner: windows-arm64
          # - platform: linux-arm64
          #   runner: ubuntu-latest
          # - platform: android-arm64
          #   runner: ubuntu-latest
    uses: ./.github/workflows/build-sdk.yml
    secrets: inherit
    with:
      platform: ${{ matrix.platform }}
      runner: ${{ matrix.runner }}
      upload_artifact: true

  build-python-sdist:
    name: build-python-sdist
    uses: ./.github/workflows/build-python-sdist.yml
    secrets: inherit
    with:
      runner: ubuntu-latest
      upload_artifact: true

  build-cli:
    name: build-cli (${{ matrix.platform }})
    needs: [build-sdk]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-arm64
            runner: windows-arm64
            build_installer: true
    uses: ./.github/workflows/build-cli.yml
    secrets: inherit
    with:
      platform: ${{ matrix.platform }}
      runner: ${{ matrix.runner }}
      build_installer: ${{ matrix.build_installer }}
      upload_artifact: true

  publish-github-release:
    name: publish-github-release
    runs-on: ubuntu-latest
    needs:
      - build-sdk
      - build-cli
      - build-python-sdist
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Validate release tag (SemVer 2.0)
        run: |
          set -euo pipefail
          semver='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*))*))?(\+([0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*))?$'
          [[ "${RELEASE_TAG}" =~ $semver ]] || { echo "Invalid SemVer 2.0 tag: ${RELEASE_TAG}"; exit 1; }

      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v5
        with:
          name: sdk-pkg-windows-arm64
          path: sdk-pkg-windows-arm64

      - uses: actions/download-artifact@v5
        with:
          name: geniex-cli-installer-windows-arm64
          path: .

      - uses: actions/download-artifact@v5
        with:
          name: geniex-python-sdist
          path: .

      - name: Package artifacts and write SHA256 sidecars
        id: assets
        run: |
          set -euo pipefail
          zip -r "geniex-sdk-windows-arm64-${RELEASE_TAG}.zip" sdk-pkg-windows-arm64
          mv geniex-cli-setup.exe "geniex-cli-installer-windows-arm64-${RELEASE_TAG}.exe"
          # Ship the HTP signing public cert so end users can add it to
          # Trusted Root + Trusted Publishers on WoS devices.
          cp .github/certs/hexagon/ggml-htp-v1.cer ggml-htp-v1.cer
          # Per-file .sha256 sidecars (one hash per file) — friendlier for
          # winget manifests and download-script consumers than a combined sums file.
          files=$(ls *.zip *.exe *.cer *.tar.gz)
          for f in $files; do sha256sum "$f" > "$f.sha256"; done
          {
            echo "files<<EOF"
            echo "$files"
            for f in $files; do echo "$f.sha256"; done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: actions/github-script@v8
        env:
          VERSION: ${{ env.RELEASE_TAG }}
          FILES: ${{ steps.assets.outputs.files }}
        with:
          script: |
            const release = require('./.github/scripts/release.js');
            await release({ github, context, core });
