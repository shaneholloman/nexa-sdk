name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release, for example v1.2.3"
        required: true
        type: string

# Workflow-level permissions are minimal. id-token: write and contents: write
# are scoped to the specific publish reusables that need them.
permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Single source of truth for RELEASE_TAG. Also fails fast (before burning
  # ~20 min of build time) on a tag that doesn't satisfy SemVer 2.0.
  resolve-tag:
    name: resolve-tag
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      is_prerelease: ${{ steps.resolve.outputs.is_prerelease }}
    steps:
      - id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          semver='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*))*))?(\+([0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*))?$'
          [[ "${TAG}" =~ $semver ]] || { echo "::error::Invalid SemVer 2.0 tag: ${TAG}"; exit 1; }
          # Pre-release = tag contains a hyphen (e.g. v1.2.3-alpha.1, -rc.1).
          # Stable releases are immutable; refuse to overwrite an existing one.
          # Pre-releases may be re-cut during iteration.
          if [[ "${TAG}" == *-* ]]; then
            is_prerelease=true
          else
            is_prerelease=false
            if gh release view "${TAG}" --json id >/dev/null 2>&1; then
              echo "::error::Stable release ${TAG} already exists — refusing to overwrite."
              exit 1
            fi
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${is_prerelease}" >> "$GITHUB_OUTPUT"

  # ── Build fan-out ────────────────────────────────────────────────
  build-sdk:
    name: build-sdk
    needs: [resolve-tag]
    uses: ./.github/workflows/_build-sdk.yml
    secrets: inherit
    with:
      upload_artifact: true

  build-android-aar:
    name: build-android-aar
    needs: [build-sdk]
    uses: ./.github/workflows/_build-android-aar.yml
    secrets: inherit
    with:
      upload_artifact: true

  build-python-sdist:
    name: build-python-sdist
    needs: [resolve-tag]
    uses: ./.github/workflows/_build-python-sdist.yml
    secrets: inherit
    with:
      upload_artifact: true

  # Overlay the Microsoft-signed HTP bundle (if available on S3) onto the
  # Windows SDK pkg tree. Kept inline rather than turned into a reusable
  # because it's tightly coupled to release-time S3 URL conventions.
  overlay-htp:
    name: overlay-htp (windows-arm64)
    runs-on: ubuntu-latest
    needs: [build-sdk]
    timeout-minutes: 10
    outputs:
      signed: ${{ steps.htp.outputs.signed }}
      llama_sha: ${{ steps.htp.outputs.llama_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Init llama.cpp submodule
        run: git submodule update --init --depth=1 third-party/llama.cpp

      - uses: actions/download-artifact@v5
        with:
          name: sdk-windows-arm64
          path: sdk-windows-arm64

      - name: Overlay Microsoft-signed HTP bundle from S3 (if available)
        id: htp
        run: |
          set -euo pipefail
          sha=$(git -C third-party/llama.cpp rev-parse --short=6 HEAD)
          url="https://qaihub-public-assets.s3.us-west-2.amazonaws.com/llama-cpp/libggml-htp-${sha}.zip"
          if curl -fsSL -o htp-signed.zip "$url"; then
            unzip -o htp-signed.zip -d sdk-windows-arm64/lib/llama_cpp/
            signed=true
          else
            signed=false
          fi
          rm -f htp-signed.zip
          echo "Signed HTP bundle for llama.cpp @ ${sha}: ${signed}"
          echo "signed=${signed}" >> "$GITHUB_OUTPUT"
          echo "llama_sha=${sha}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v5
        with:
          name: sdk-windows-arm64
          path: sdk-windows-arm64/
          retention-days: 1
          overwrite: true

  build-cli:
    name: build-cli
    needs: [overlay-htp]
    uses: ./.github/workflows/_build-cli.yml
    secrets: inherit
    with:
      # Installer is windows-only; the linux matrix cell ignores this flag.
      build_installer: true
      upload_artifact: true

  # Windows Authenticode signing for the CLI installer (not the HTP driver —
  # that signing happens during _build-sdk.yml). Placeholder today; the
  # stage exists so the DAG + artifact flow can be validated end-to-end
  # before the real signer lands.
  sign-windows:
    name: sign-windows
    needs: [build-cli]
    uses: ./.github/workflows/_sign-windows.yml
    secrets: inherit
    with:
      artifact_name: cli-installer-windows-arm64

  # ── Publish fan-out (runs in parallel) ──────────────────────────
  publish-github-release:
    name: publish-github-release
    needs:
      - resolve-tag
      - overlay-htp
      - build-cli
      - build-python-sdist
      - build-android-aar
      - sign-windows
    uses: ./.github/workflows/_publish-github-release.yml
    secrets: inherit
    with:
      release_tag: ${{ needs.resolve-tag.outputs.tag }}
      htp_signed: ${{ needs.overlay-htp.outputs.signed }}
      llama_sha: ${{ needs.overlay-htp.outputs.llama_sha }}

  publish-s3:
    name: publish-s3
    needs: [resolve-tag, publish-github-release]
    uses: ./.github/workflows/_publish-s3.yml
    secrets: inherit
    with:
      release_tag: ${{ needs.resolve-tag.outputs.tag }}

  publish-docker:
    name: publish-docker
    needs: [resolve-tag, build-cli]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_build-docker.yml
    secrets: inherit
    with:
      push: true
      image: ghcr.io/qcom-ai-hub/geniex-cli
      tag: ${{ needs.resolve-tag.outputs.tag }}
      is_prerelease: ${{ needs.resolve-tag.outputs.is_prerelease == 'true' }}

  # TestPyPI — pre-release tags only. Stable tags go to production PyPI
  # via publish-pypi below.
  publish-testpypi:
    name: publish-testpypi
    needs: [resolve-tag, build-python-sdist]
    if: needs.resolve-tag.outputs.is_prerelease == 'true'
    uses: ./.github/workflows/_publish-testpypi.yml
    secrets: inherit
    with:
      release_tag: ${{ needs.resolve-tag.outputs.tag }}

  # Production PyPI — stable tags only. Stub today.
  publish-pypi:
    name: publish-pypi
    needs: [resolve-tag, build-python-sdist]
    if: needs.resolve-tag.outputs.is_prerelease == 'false'
    uses: ./.github/workflows/_publish-pypi.yml
    secrets: inherit
    with:
      release_tag: ${{ needs.resolve-tag.outputs.tag }}

  # Maven Central for the Android AAR. Stub today; runs for every tag once
  # wired up, distinguishing pre/stable via the artifact version.
  publish-maven:
    name: publish-maven
    needs: [resolve-tag, build-android-aar]
    uses: ./.github/workflows/_publish-maven.yml
    secrets: inherit
    with:
      release_tag: ${{ needs.resolve-tag.outputs.tag }}
      is_prerelease: ${{ needs.resolve-tag.outputs.is_prerelease == 'true' }}

  # Winget — stable tags only. Stub today.
  publish-winget:
    name: publish-winget
    needs: [resolve-tag, build-cli, sign-windows]
    if: needs.resolve-tag.outputs.is_prerelease == 'false'
    uses: ./.github/workflows/_publish-winget.yml
    secrets: inherit
    with:
      release_tag: ${{ needs.resolve-tag.outputs.tag }}
