name: Scorecard

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      device:
        description: "QDC chipset (blank = all devices)"
        type: string
        default: ""

permissions:
  contents: read
  packages: read

jobs:
  build-sdk:
    uses: ./.github/workflows/_build-sdk.yml
    secrets: inherit
    with:
      version_tag: ${{ github.event_name == 'push' && github.ref_name || '' }}
      upload_artifact: true

  load-models:
    needs: [build-sdk]
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      devices: ${{ steps.set.outputs.devices }}
    steps:
      - uses: actions/checkout@v6
      - id: set
        env:
          PICK: ${{ github.event.inputs.device }}
        run: |
          echo "matrix=$(jq -c . sdk/benchmark/qdc/scorecard-models.json)" >> "$GITHUB_OUTPUT"
          all='["QCS9075M","SC8380XP","SC8480XP","SM8750","SM8850"]'
          devices=$([ -n "$PICK" ] && jq -cn --arg d "$PICK" '[$d]' || echo "$all")
          echo "devices=$devices" >> "$GITHUB_OUTPUT"

  scorecard:
    name: ${{ matrix.device }} · ${{ matrix.model.plugin }} · ${{ matrix.model.name }}
    needs: [build-sdk, load-models]
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        device: ${{ fromJson(needs.load-models.outputs.devices) }}
        model: ${{ fromJson(needs.load-models.outputs.matrix) }}
    env:
      QDC_API_KEY: ${{ secrets.QDC_API_KEY }}
      GENIEX_RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - id: sdk
        run: |
          case "${{ matrix.device }}" in
            SM*)         echo "name=sdk-android-arm64" ;;
            SC*|CRD*|X*) echo "name=sdk-windows-arm64" ;;
            *)           echo "name=sdk-linux-arm64" ;;
          esac >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v8
        with:
          name: ${{ steps.sdk.outputs.name }}
          path: pkg-geniex
      - uses: ./.github/actions/install-qdc-sdk
      - run: |
          python sdk/benchmark/qdc/run_qdc_jobs.py \
            --pkg-dir pkg-geniex \
            --device "${{ matrix.device }}" \
            --model-name "${{ matrix.model.name }}" \
            --cells-out "${{ matrix.device }}-${{ matrix.model.name }}.json"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: scorecard-cells-${{ matrix.device }}-${{ matrix.model.name }}
          path: ${{ matrix.device }}-${{ matrix.model.name }}.json
          if-no-files-found: ignore

  aggregate:
    name: aggregate · ${{ matrix.device }}
    needs: [load-models, scorecard]
    if: always()
    runs-on: ubuntu-latest
    strategy:
      matrix:
        device: ${{ fromJson(needs.load-models.outputs.devices) }}
    env:
      GENIEX_RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@v8
        with:
          pattern: scorecard-cells-${{ matrix.device }}-*
          path: cells
      - run: |
          python sdk/benchmark/qdc/run_qdc_jobs.py \
            --device "${{ matrix.device }}" \
            --render-dir cells
