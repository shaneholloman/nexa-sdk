# TEMP: end-to-end test for the Android APK build + S3 upload pipeline.
# Trigger manually via "Run workflow" with an RC tag (e.g. v0.0.0-rc.test).
# Behaves like a release dry-run — uploads only the versioned APK, does NOT
# touch the mutable geniex-demo.apk "latest stable" pointer.
#
# Delete this file once the new pipeline is validated.
name: TEMP - Test Android APK Release

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: "RC tag (must contain '-', e.g. v0.0.0-rc.test)"
        required: true
        type: string
        default: "v0.0.0-rc.test"

permissions:
  contents: read
  packages: read
  id-token: write

concurrency:
  group: test-android-apk-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-tag:
    name: validate-tag
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - id: check
        env:
          TAG: ${{ inputs.rc_tag }}
        run: |
          set -euo pipefail
          semver='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*))*))?(\+([0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*))?$'
          [[ "${TAG}" =~ $semver ]] || { echo "::error::Invalid SemVer tag: ${TAG}"; exit 1; }
          [[ "${TAG}" == *-* ]] || { echo "::error::${TAG} is not a pre-release (must contain '-')"; exit 1; }
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build-sdk:
    name: build-sdk
    needs: [validate-tag]
    uses: ./.github/workflows/_build-sdk.yml
    secrets: inherit
    with:
      version_tag: ${{ needs.validate-tag.outputs.tag }}
      upload_artifact: true

  build-android-apk:
    name: build-android-apk
    needs: [build-sdk]
    uses: ./.github/workflows/_build-android-apk.yml
    secrets: inherit
    with:
      upload_artifact: true

  publish-s3:
    name: publish-s3 (apk only)
    needs: [validate-tag, build-android-apk]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ needs.validate-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - uses: actions/download-artifact@v8
        with:
          name: android-apk
          path: .

      - name: Rename APK
        run: mv geniex-demo.apk "geniex-demo-${RELEASE_TAG}.apk"

      - name: Configure AWS credentials (bitsyfactory role)
        uses: ./.github/actions/configure-multiple-aws-roles
        with:
          profile: bitsy
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::234967179373:role/github-bitsyfactory
          role-session-name: geniex-test-apk-${{ github.run_id }}

      - name: Upload Android demo APK to S3 (versioned only)
        shell: bash
        env:
          AWS_PROFILE: bitsy
          AWS_DEFAULT_REGION: us-west-2
        run: |
          set -euo pipefail
          src="geniex-demo-${RELEASE_TAG}.apk"
          # RC-only: write the versioned object but NEVER touch
          # geniex-demo.apk (the mutable "latest stable" pointer is
          # reserved for bare vX.Y.Z tags via release.yml).
          aws s3 cp "${src}" \
            "s3://qaihub-public-assets/qai-hub-geniex/${src}" \
            --acl public-read
          echo "::notice::Uploaded https://qaihub-public-assets.s3.us-west-2.amazonaws.com/qai-hub-geniex/${src}"
