name: Test

# Top-level test entry point for tag pushes and manual reruns. Builds
# the SDK on demand, then fans out to _test.yml for the three caller
# jobs (go-test, python-pytest, sdk-pytest), each a 2-cell matrix over
# linux-arm64 + windows-arm64 — six checks total.
#
# This workflow is independent of release.yml. Both fire on the same
# tag push but as siblings: failures here surface as a red check on the
# tag commit and never gate the publish-* jobs in release.yml.
#
# pr-check.yml does NOT call this file — it calls _test.yml directly so
# the SDK build is shared with the rest of the PR graph.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Explicit version tag (passed to build-sdk on workflow_dispatch)."
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: read

jobs:
  build-sdk:
    uses: ./.github/workflows/_build-sdk.yml
    secrets: inherit
    with:
      upload_artifact: true
      version_tag: ${{ inputs.version_tag || github.ref_name }}

  go-test:
    needs: [build-sdk]
    if: ${{ !cancelled() && needs.build-sdk.result != 'failure' }}
    uses: ./.github/workflows/_test.yml
    secrets: inherit
    with:
      language: go
      gate_on_changed_files: false

  python-pytest:
    needs: [build-sdk]
    if: ${{ !cancelled() && needs.build-sdk.result != 'failure' }}
    uses: ./.github/workflows/_test.yml
    secrets: inherit
    with:
      language: python
      gate_on_changed_files: false

  sdk-pytest:
    needs: [build-sdk]
    if: ${{ !cancelled() && needs.build-sdk.result != 'failure' }}
    uses: ./.github/workflows/_test.yml
    secrets: inherit
    with:
      language: sdk
      # Linux disabled until the llama_cpp plugin can load without OpenCL.
      platforms: '["windows-arm64"]'
      gate_on_changed_files: false
