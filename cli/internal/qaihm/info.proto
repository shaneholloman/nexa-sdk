syntax = "proto3";

package qaihm;

option go_package = "github.com/qcom-it-nexa-ai/geniex/cli/gen/qaihm;qaihm";

import "platform.proto";
import "numerics.proto";

enum ModelLicense {
  MODEL_LICENSE_UNSPECIFIED = 0;

  // General
  MODEL_LICENSE_UNLICENSED = 1;
  MODEL_LICENSE_COMMERCIAL = 2;
  MODEL_LICENSE_AI_HUB_MODELS_LICENSE = 3;

  // Non-restrictive
  MODEL_LICENSE_APACHE_2_0 = 4;
  MODEL_LICENSE_MIT = 5;
  MODEL_LICENSE_BSD_3_CLAUSE = 6;
  MODEL_LICENSE_CC_BY_4_0 = 7;

  // Copyleft (derivative works must have the same license)
  MODEL_LICENSE_AGPL_3_0 = 8;
  MODEL_LICENSE_GPL_3_0 = 9;
  MODEL_LICENSE_CREATIVEML_OPENRAIL_M = 10;

  // Commercial use prohibited
  MODEL_LICENSE_CC_BY_NON_COMMERCIAL_4_0 = 11;
  MODEL_LICENSE_OTHER_NON_COMMERCIAL = 12;

  // Licenses for specific models
  MODEL_LICENSE_LLAMA2 = 13;
  MODEL_LICENSE_LLAMA3 = 14;
  MODEL_LICENSE_TAIDE = 15;
  MODEL_LICENSE_FALCON3 = 16;
  MODEL_LICENSE_GEMMA = 17;
  MODEL_LICENSE_LFM1_0 = 18;
  MODEL_LICENSE_AIMET_MODEL_ZOO = 19;
}

enum ModelDomain {
  MODEL_DOMAIN_UNSPECIFIED = 0;
  MODEL_DOMAIN_COMPUTER_VISION = 1;
  MODEL_DOMAIN_MULTIMODAL = 2;
  MODEL_DOMAIN_AUDIO = 3;
  MODEL_DOMAIN_GENERATIVE_AI = 4;
}

enum ModelTag {
  MODEL_TAG_UNSPECIFIED = 0;
  MODEL_TAG_BACKBONE = 1;
  MODEL_TAG_REAL_TIME = 2;
  MODEL_TAG_FOUNDATION = 3;
  MODEL_TAG_LLM = 4;
  MODEL_TAG_GENERATIVE_AI = 5;
  MODEL_TAG_BU_IOT = 6;
  MODEL_TAG_BU_AUTO = 7;
  MODEL_TAG_BU_COMPUTE = 8;
  MODEL_TAG_MOE = 9;
}

enum ModelStatus {
  MODEL_STATUS_UNSPECIFIED = 0;
  MODEL_STATUS_PUBLISHED = 1;
  MODEL_STATUS_UNPUBLISHED = 2;
  // Pending models are waiting for scorecard to collect perf data before being published.
  MODEL_STATUS_PENDING = 3;
}

enum ModelUseCase {
  MODEL_USE_CASE_UNSPECIFIED = 0;

  // Image
  MODEL_USE_CASE_IMAGE_CLASSIFICATION = 1;
  MODEL_USE_CASE_IMAGE_EDITING = 2;
  MODEL_USE_CASE_IMAGE_GENERATION = 3;
  MODEL_USE_CASE_SUPER_RESOLUTION = 4;
  MODEL_USE_CASE_SEMANTIC_SEGMENTATION = 5;
  MODEL_USE_CASE_DEPTH_ESTIMATION = 6;
  MODEL_USE_CASE_GAZE_ESTIMATION = 7;

  // E.g. OCR, image caption
  MODEL_USE_CASE_IMAGE_TO_TEXT = 8;
  MODEL_USE_CASE_OBJECT_DETECTION = 9;
  MODEL_USE_CASE_POSE_ESTIMATION = 10;
  MODEL_USE_CASE_DRIVER_ASSISTANCE = 11;
  MODEL_USE_CASE_ROBOTICS = 12;

  // Audio
  MODEL_USE_CASE_SPEECH_RECOGNITION = 13;
  MODEL_USE_CASE_AUDIO_ENHANCEMENT = 14;
  MODEL_USE_CASE_AUDIO_CLASSIFICATION = 15;
  MODEL_USE_CASE_AUDIO_GENERATION = 16;

  // Video
  MODEL_USE_CASE_VIDEO_CLASSIFICATION = 17;
  MODEL_USE_CASE_VIDEO_GENERATION = 18;
  MODEL_USE_CASE_VIDEO_OBJECT_TRACKING = 19;

  // LLM
  MODEL_USE_CASE_TEXT_GENERATION = 20;
}

// Schema for model info.yaml.
message ModelInfo {

  string aihm_version = 1;

  // ---------------------------------------------------------------------------
  // Identity
  // ---------------------------------------------------------------------------
  // Name of the model's folder within the repo.
  string id = 2;

  // Name of the model as it will appear on the website.
  // Should have dashes instead of underscores and all
  // words capitalized. For example, `Whisper-Base-En`.
  string name = 3;

  // Whether or not the model is published on the website.
  // This should be set to public unless the model has poor accuracy/perf.
  ModelStatus status = 4;

  // If status is private, this must have a reference to an issue with an explanation.
  optional string status_reason = 5;

  // ---------------------------------------------------------------------------
  // Description & categorization
  // ---------------------------------------------------------------------------

  // A brief catchy headline explaining what the model does and why it may be interesting.
  string headline = 6;

  // The domain the model is used in such as computer vision, audio, etc.
  ModelDomain domain = 7;

  // A 2-3 sentence description of how the model can be used.
  string description = 8;

  // What task the model is used to solve, such as object detection, classification, etc.
  ModelUseCase use_case = 9;

  // A list of applicable tags to add to the model.
  repeated ModelTag tags = 10;

  // A list of real-world applications for which this model could be used.
  // This is free-form and almost anything reasonable here is fine.
  repeated string applicable_scenarios = 11;

  // A list of other similar models in the repo.
  // Typically, any model that performs the same task is fine.
  // If nothing fits, this can be left blank. Limit to 3 models.
  repeated string related_models = 12;

  // A list of device types for which this model could be useful.
  // If unsure what to put here, default to Phone and Tablet.
  repeated FormFactor form_factors = 13;

  // ---------------------------------------------------------------------------
  // Metadata
  // ---------------------------------------------------------------------------

  // A list of a few technical details about the model.
  //   Model checkpoint: The name of the downloaded model checkpoint file.
  //   Input resolution: The size of the model's input. For example, `2048x1024`.
  //   Number of parameters: The number of parameters in the model.
  //   Model size: The file size of the downloaded model asset.
  //   Number of output classes: The number of classes the model can classify or annotate.
  repeated TechnicalDetail technical_details = 14;

  // The license type of the original model repo.
  ModelLicense license_type = 15;

  // Some models are made by a company.
  optional string model_maker_id = 16;

  // A list of datasets for which the model has pre-trained checkpoints
  // available as options in `model.py`. Typically only has one entry.
  repeated string dataset = 17;

  // ---------------------------------------------------------------------------
  // References
  // ---------------------------------------------------------------------------

  // Link to the research paper where the model was first published. Usually an arxiv link.
  optional string research_paper = 18;

  // The title of the research paper.
  optional string research_paper_title = 19;

  // A link to the original github repo with the model's code.
  optional string source_repo = 20;

  // A link to the model's license. Most commonly found in the github repo it was cloned from.
  optional string license_url = 21;

  // ---------------------------------------------------------------------------
  // Branding
  // ---------------------------------------------------------------------------

  // Whether the model has a static image uploaded in S3. All published models must have this.
  bool has_static_banner = 22;

  // Whether the model has an animated asset uploaded in S3. This is optional.
  bool has_animated_banner = 23;

  reserved 24;

  // ---------------------------------------------------------------------------
  // Features & deployment
  // ---------------------------------------------------------------------------

  // Whether the model is compatible with the IMSDK Plugin for IOT devices.
  bool imsdk_supported = 25;

  // If set, model assets shouldn't be distributed.
  bool restrict_model_sharing = 26;

  // ---------------------------------------------------------------------------
  // Validation
  // ---------------------------------------------------------------------------

  // Expected accuracy benchmark. If set, scorecard will flag results that
  // deviate from this value by more than the metric's metric_enablement_threshold.
  optional NumericsAccuracyBenchmark numerics_benchmark = 27;

  // ---------------------------------------------------------------------------
  // LLM-specific
  // ---------------------------------------------------------------------------

  // Whether it is a large language model (LLM) or not.
  bool model_type_llm = 28;

  optional LLMDetails llm_details = 29;

  // Device form factors for which we don't publish performance data.
  repeated FormFactor private_perf_form_factors = 30;

  message TechnicalDetail {
    string key = 1;

    oneof value {
      string string_value = 2;
      int64 int_value = 3;
      double float_value = 4;
    }
  }

  message LLMDetails {
    CallToAction call_to_action = 1;

    // Genie (QNN context binary) support
    bool genie_compatible = 2;

    // llama.cpp support
    // Whether the model runs with llama.cpp. If true, llama_cpp_model_url must be set.
    bool llama_cpp_compatible = 3;

    // Global llama.cpp model URL — used when genie_compatible is false.
    // This allows specifying the URL once instead of per device.
    optional string llama_cpp_model_url = 4;

    enum CallToAction {
      CALL_TO_ACTION_UNSPECIFIED = 0;
      CALL_TO_ACTION_DOWNLOAD = 1;
      CALL_TO_ACTION_VIEW_README = 2;
      CALL_TO_ACTION_DOWNLOAD_AND_VIEW_README = 3;
      CALL_TO_ACTION_CONTACT_FOR_PURCHASE = 4;
      CALL_TO_ACTION_CONTACT_FOR_DOWNLOAD = 5;
      CALL_TO_ACTION_COMING_SOON = 6;
      CALL_TO_ACTION_CONTACT_US = 7;
    }
  }
}
