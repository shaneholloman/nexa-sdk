syntax = "proto3";

package qaihm;

option go_package = "github.com/qcom-it-nexa-ai/geniex/cli/gen/qaihm;qaihm";

import "shared/range.proto";
import "shared/precision.proto";
import "shared/runtime.proto";

// Expected accuracy benchmark for a model on a specific dataset/metric.
// Used in info.yaml to set the expected value scorecard checks against.
message NumericsAccuracyBenchmark {
  string dataset_name = 1;
  string metric_name = 2;
  double value = 3;
  string unit = 4;

  // Where this benchmark value came from (e.g., a URL to the paper or
  // model card, or "AI Hub Models Reference Eval" for scorecard-derived values).
  string source = 5;
}

// Schema for numerics.yaml — model numerical accuracy metrics.
message ModelNumerics {
  string aihm_version = 1;

  string model_id = 2;

  repeated NumericsMetric metrics = 3;

  message NumericsMetric {
    // Dataset
    string dataset_name = 1;
    string dataset_link = 2;
    string dataset_split_description = 3;

    // Metric definition
    string metric_name = 4;
    string metric_description = 5;
    string metric_unit = 6;
    DoubleRange metric_range = 7;

    // Maximum allowed deviation between torch and device accuracy, or
    // between actual accuracy and the benchmark value.
    // Paths exceeding this threshold are disabled by the scorecard.
    optional double metric_enablement_threshold = 8;

    // Expected accuracy from info.yaml's numerics_benchmark.
    optional double benchmark_value = 9;

    // Torch reference values
    int32 num_partial_samples = 10;
    double partial_torch_metric = 11;

    // Per-device results
    repeated DeviceNumericsMetrics device_metrics = 12;

    message DeviceNumericsMetrics {
      string device = 1;
      Precision precision = 2;
      Runtime runtime = 3;
      double partial_metric = 4;
    }
  }
}
