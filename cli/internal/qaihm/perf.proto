syntax = "proto3";

package qaihm;

option go_package = "github.com/qcom-it-nexa-ai/geniex/cli/gen/qaihm;qaihm";

import "shared/range.proto";
import "shared/precision.proto";
import "shared/runtime.proto";
import "shared/tool_versions.proto";

// Schema for perf.yaml files.
message ModelPerf {
  string aihm_version = 1;

  string model_id = 2;

  repeated string supported_devices = 3;

  repeated string supported_chipsets = 4;

  repeated PerformanceDetails performance_metrics = 5;

  message PerformanceDetails {
    Precision precision = 1;

    optional string component = 2;

    string device = 3;

    Runtime runtime = 4;

    // The tool versions used to generate these results.
    ToolVersions tool_versions = 5;

    // Set for all non-LLMs.
    optional ProfileJob profile_job = 6;

    // Set for all non-LLMs, unless profiling fails.
    optional PerfMetrics metrics = 7;

    // Only used for LLMs.
    repeated LLMPerfMetrics llm_metrics = 8;
  }

  message ProfileJob {
    string id = 1;

    string status = 2;
  }

  message PerfMetrics {
    double inference_time_milliseconds = 1;

    IntRange estimated_peak_memory_range_mb = 2;

    string primary_compute_unit = 3;

    LayerCounts layer_counts = 4;

    message LayerCounts {
      int32 total = 1;

      int32 npu = 2;

      int32 gpu = 3;

      int32 cpu = 4;
    }
  }

  message LLMPerfMetrics {
    int32 context_length = 1;

    double tokens_per_second = 2;

    optional DoubleRange time_to_first_token_range_milliseconds = 3;
  }
}
