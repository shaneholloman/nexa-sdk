syntax = "proto3";

package qaihm;

option go_package = "github.com/qcom-it-nexa-ai/geniex/cli/gen/qaihm;qaihm";

import "shared/precision.proto";
import "shared/runtime.proto";

// ---------------------------------------------------------------------------
// Enums & Descriptor Structs
// ---------------------------------------------------------------------------

enum FormFactor {
  FORM_FACTOR_UNSPECIFIED = 0;
  FORM_FACTOR_PHONE = 1;
  FORM_FACTOR_TABLET = 2;
  FORM_FACTOR_AUTO = 3;
  FORM_FACTOR_XR = 4;
  FORM_FACTOR_COMPUTE = 5;
  FORM_FACTOR_IOT = 6;
}

enum OperatingSystemType {
  OPERATING_SYSTEM_TYPE_UNSPECIFIED = 0;
  OPERATING_SYSTEM_TYPE_ANDROID = 1;
  OPERATING_SYSTEM_TYPE_WINDOWS = 2;
  OPERATING_SYSTEM_TYPE_LINUX = 3;
  OPERATING_SYSTEM_TYPE_QC_LINUX = 4;
}

enum WebsiteWorld {
  WEBSITE_WORLD_UNSPECIFIED = 0;
  WEBSITE_WORLD_MOBILE = 1;
  WEBSITE_WORLD_COMPUTE = 2;
  WEBSITE_WORLD_AUTOMOTIVE = 3;
  WEBSITE_WORLD_IOT = 4;
  WEBSITE_WORLD_XR = 5;
}

enum WebsiteIcon {
  WEBSITE_ICON_UNSPECIFIED = 0;
  WEBSITE_ICON_CAR = 1;
  WEBSITE_ICON_IOT_CHIP = 2;
  WEBSITE_ICON_IOT_DRONE = 3;
  WEBSITE_ICON_LAPTOP_GENERIC = 4;
  WEBSITE_ICON_LAPTOP_X_ELITE = 5;
  WEBSITE_ICON_PHONE_S21 = 6;
  WEBSITE_ICON_PHONE_S22 = 7;
  WEBSITE_ICON_PHONE_S23 = 8;
  WEBSITE_ICON_PHONE_S23_ULTRA = 9;
  WEBSITE_ICON_PHONE_S24 = 10;
  WEBSITE_ICON_PHONE_S24_ULTRA = 11;
  WEBSITE_ICON_TABLET_ANDROID = 12;
  WEBSITE_ICON_XR_HEADSET = 13;
}

message OperatingSystem {
  OperatingSystemType ostype = 1;

  string version = 2;
}

// ---------------------------------------------------------------------------
// Metadata Structs
// ---------------------------------------------------------------------------

message FormFactorInfo {
  FormFactor form_factor = 1;

  string display_name = 2;

  WebsiteWorld world = 3;
}

message DeviceInfo {
  string name = 1;

  string chipset = 2;

  uint32 npu_count = 3;

  OperatingSystem os = 4;

  FormFactor form_factor = 5;

  string vendor = 6;

  WebsiteIcon icon = 7;

  bool enabled_in_scorecard = 8;
}

message ChipsetInfo {
  string name = 1;

  repeated string aliases = 2;

  string marketing_name = 3;

  WebsiteWorld world = 4;

  bool supports_fp16 = 5;

  uint32 htp_version = 6;

  uint32 soc_model = 7;

  string reference_device = 8;
}

message RuntimeInfo {
  Runtime runtime = 1;

  string website_runtime = 2;

  string file_extension = 3;

  bool is_aot_compiled = 4;
}

// AI Hub Platform registry: devices, chipsets, form factors, and runtimes.
message PlatformInfo {
  string aihm_version = 1;

  repeated RuntimeInfo runtimes = 2;

  repeated FormFactorInfo form_factors = 3;

  repeated DeviceInfo devices = 4;

  repeated ChipsetInfo chipsets = 5;
}
