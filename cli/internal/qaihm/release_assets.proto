syntax = "proto3";

package qaihm;

option go_package = "github.com/qcom-it-nexa-ai/geniex/cli/gen/qaihm;qaihm";

import "shared/precision.proto";
import "shared/runtime.proto";
import "shared/tool_versions.proto";

// Schema for model release-assets.yaml files.
message ModelReleaseAssets {
  string aihm_version = 1;

  string model_id = 2;

  repeated AssetDetails assets = 3;

  message AssetDetails {
    Precision precision = 1;

    Runtime runtime = 2;

    // Optional for universal assets, set for chipset-specific assets.
    optional string chipset = 3;

    string download_url = 4;

    ToolVersions tool_versions = 5;
  }
}
