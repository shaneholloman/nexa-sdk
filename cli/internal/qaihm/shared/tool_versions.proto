syntax = "proto3";

package qaihm;

option go_package = "github.com/qcom-it-nexa-ai/geniex/cli/gen/qaihm;qaihm";

// Toolchains used to compile or profile models.
message ToolVersions {
  optional string ai_hub_models = 1;

  optional string qairt = 2;

  optional string onnx = 3;

  optional string onnx_runtime = 4;

  optional string tflite = 5;

  optional string litert = 6;
}
