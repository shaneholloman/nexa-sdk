[pytest]
testpaths = .
python_files = test_*.py
addopts = -v --tb=short --strict-markers
markers =
    api: SDK metadata APIs that need no model
    llama_cpp: tests using the llama_cpp plugin
    qairt: tests using the qairt plugin (requires NPU)
    llm: text-only generation
    vlm: vision-language generation
    device_cpu: cpu backend (works anywhere)
    device_gpu: GPUOpenCL backend (Adreno on Snapdragon)
    device_npu: HTP NPU backend (Snapdragon only)
    device_hybrid: HTP+CPU hybrid scheduler (Snapdragon only)
    snapdragon: requires real Snapdragon host (gated by GENIEX_DEVICE_TEST=1)
norecursedirs = cli
